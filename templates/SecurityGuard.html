{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gate Pass Scanner - MartGenie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            base: '#f8fafc', text: '#0f172a', muted: '#64748b',
                            primary: '#2563eb', accent: '#3b82f6', highlight: '#f1f5f9'
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="min-h-screen text-brand-text bg-brand-base relative overflow-x-hidden font-sans">
    <!-- Soft background -->
    <div class="fixed top-[-10%] left-[-5%] w-[40rem] h-[40rem] rounded-full bg-blue-500/8 blur-[100px] pointer-events-none -z-10"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[35rem] h-[35rem] rounded-full bg-indigo-500/8 blur-[100px] pointer-events-none -z-10"></div>

    <!-- Header -->
    <header class="bg-white sticky top-0 z-20 border-b border-slate-100 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 md:px-6 py-3.5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-600 to-indigo-600 flex items-center justify-center shadow-sm">
                    <i data-lucide="shield-check" class="text-white w-5 h-5"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-brand-text flex items-center gap-2">
                        Gate Pass <span class="text-blue-600">Scanner</span>
                        <span class="bg-emerald-50 text-emerald-700 text-[10px] font-semibold px-2 py-0.5 rounded-full">Active</span>
                    </h1>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="hidden md:block text-right">
                    <p class="text-xs text-brand-muted">Station</p>
                    <p class="text-sm font-semibold text-brand-text">Exit Gate</p>
                </div>
                <a href="{% url 'logout' %}" class="bg-red-50 hover:bg-red-100 text-red-600 rounded-lg px-4 py-2 flex items-center gap-2 font-semibold transition-colors active:scale-95 text-sm">
                    <i data-lucide="log-out" class="h-4 w-4"></i>
                    <span class="hidden md:inline">Log Out</span>
                </a>
            </div>
        </div>
    </header>

    <div class="max-w-6xl mx-auto px-4 md:px-6 py-6 relative z-10" id="main-container">
        <!-- Content injected by JS -->
    </div>

    <script>
        let scanResult = null;
        let scannedOrder = null;
        let isScanning = false;
        let isCameraActive = false;
        let recentScans = [];
        let currentQrData = null;
        let html5QrCode = null;

        window.addEventListener('load', render);

        async function startCamera() {
            isCameraActive = true;
            render();

            await new Promise(r => setTimeout(r, 100));

            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }

            const config = { fps: 15, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0, formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE ] };

            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess).catch(err => {
                console.error("Error starting camera", err);
                alert("Could not access camera. Please check permissions.");
                stopCamera();
            });
        }

        function stopCamera() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    html5QrCode.clear();
                    html5QrCode = null;
                }).catch(err => console.error(err));
            }
            isCameraActive = false;
            render();
        }

        function onScanSuccess(decodedText, decodedResult) {
            stopCamera();
            currentQrData = decodedText;
            verifyPass('fetch');
        }

        async function verifyPass(action = 'fetch', decision = null) {
            const input = document.getElementById('manual-entry');
            let qrData = currentQrData;

            if (action === 'fetch' && !qrData) {
                if (input && input.value.trim()) {
                    qrData = input.value.trim();
                    currentQrData = qrData;
                } else return;
            }

            isScanning = true;
            render();

            try {
                const payload = { qr_data: qrData, action: action };
                if (decision) payload.decision = decision;

                const response = await fetch("{% url 'verify_pass' %}", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (action === 'fetch') {
                    if (data.status === 'review') {
                        scanResult = 'review';
                        scannedOrder = { orderId: data.order_id, total: parseFloat(data.amount), items: data.items.map(i => ({ name: i.product_name, quantity: i.quantity })) };
                    } else if (data.status === 'used') {
                        scanResult = 'used';
                        scannedOrder = { gate_pass_used_at: data.time, orderId: data.order_id, total: parseFloat(data.amount || 0), items: data.items ? data.items.map(i => ({ name: i.product_name, quantity: i.quantity })) : [] };
                    } else {
                        scanResult = data.status; 
                    }
                } else if (action === 'decide') {
                    if (data.status === 'approved') {
                        scanResult = 'approved';
                        recentScans.unshift({ order: scannedOrder, result: 'valid', timestamp: new Date().toISOString() });
                    } else if (data.status === 'rejected') {
                        scanResult = 'rejected';
                        recentScans.unshift({ order: scannedOrder, result: 'rejected', timestamp: new Date().toISOString() });
                    }
                }

                if (recentScans.length > 8) recentScans = recentScans.slice(0, 8);

            } catch (error) {
                console.error('Verification failed:', error);
                scanResult = 'error';
            }

            isScanning = false;
            render();
        }

        function resetScan() {
            scanResult = null;
            scannedOrder = null;
            currentQrData = null;
            render();
        }

        function render() {
            const container = document.getElementById('main-container');
            let mainContent = '';

            // 1. Camera Mode
            if (isCameraActive) {
                mainContent = `
                    <div class="bg-slate-900 rounded-2xl overflow-hidden p-6 md:p-8 flex flex-col items-center justify-center min-h-[500px] shadow-lg">
                        <p class="text-white font-semibold mb-5 text-sm flex items-center gap-2">
                            <i data-lucide="camera" class="w-4 h-4 text-blue-400"></i> Scanning...
                        </p>
                        <div id="reader" class="w-full max-w-sm rounded-xl overflow-hidden border border-blue-500/30"></div>
                        <button onclick="stopCamera()" class="mt-6 bg-white/10 hover:bg-white/20 text-white px-6 py-2.5 rounded-lg font-semibold transition-all text-sm flex items-center gap-2">
                           <i data-lucide="x" class="w-4 h-4"></i> Stop Camera
                        </button>
                    </div>
                `;
            }
            // 2. Loading
            else if (isScanning) {
                mainContent = `
                    <div class="bg-white rounded-2xl p-8 flex flex-col items-center justify-center min-h-[500px] shadow-sm">
                        <div class="w-16 h-16 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin mb-5"></div>
                        <p class="text-brand-text font-semibold">Checking pass...</p>
                        <p class="text-brand-muted text-sm mt-1">Please wait</p>
                    </div>
                `;
            }
            // 3. Review Order
            else if (scanResult === 'review') {
                mainContent = `
                    <div class="bg-slate-900 rounded-2xl p-6 md:p-8 text-white min-h-[500px] flex flex-col shadow-lg">
                        <div class="flex items-center gap-3 mb-6">
                            <div class="w-10 h-10 rounded-lg bg-blue-500/20 flex items-center justify-center text-blue-400">
                                <i data-lucide="search" class="w-5 h-5"></i>
                            </div>
                            <div>
                                <h2 class="text-xl font-bold">Review Order</h2>
                                <p class="text-slate-400 text-xs mt-0.5">Order #${scannedOrder.orderId}</p>
                            </div>
                        </div>

                        <div class="bg-white/5 border border-white/10 rounded-xl p-4 mb-5 flex justify-between items-center">
                            <div>
                                <p class="text-slate-400 text-xs mb-1">Total Amount</p>
                                <p class="text-2xl font-bold text-blue-400">Rs ${scannedOrder.total.toFixed(2)}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-slate-400 text-xs mb-1">Items</p>
                                <p class="text-xl font-bold text-white">${scannedOrder.items.length}</p>
                            </div>
                        </div>

                        <div class="flex-1 overflow-y-auto bg-black/30 rounded-xl p-3 border border-white/5 mb-6 custom-scrollbar">
                             ${scannedOrder.items.map(item => `
                                <div class="flex justify-between items-center text-sm py-2.5 px-3 border-b border-white/5 last:border-0">
                                    <span class="text-slate-200">${item.name}</span>
                                    <span class="text-blue-300 bg-blue-500/20 px-2 py-0.5 rounded text-xs font-semibold">x${item.quantity}</span>
                                </div>
                            `).join('')}
                        </div>

                        <div class="flex gap-3 w-full mt-auto">
                            <button onclick="verifyPass('decide', 'REJECTED')" class="flex-1 bg-red-500/20 hover:bg-red-500/30 border border-red-500/30 text-red-200 py-3.5 rounded-xl font-semibold transition-all flex items-center justify-center gap-2 text-sm">
                                <i data-lucide="x" class="w-4 h-4"></i> Deny
                            </button>
                            <button onclick="verifyPass('decide', 'APPROVED')" class="flex-[2] bg-emerald-500 hover:bg-emerald-600 text-white py-3.5 rounded-xl font-bold transition-all shadow-md flex items-center justify-center gap-2">
                                <i data-lucide="check" class="w-5 h-5"></i> Approve
                            </button>
                        </div>
                    </div>
                `;
            }
            // 4. Results
            else if (scanResult === 'approved') {
                mainContent = `
                    <div class="bg-emerald-500 rounded-2xl p-8 text-white min-h-[500px] flex flex-col justify-center items-center text-center shadow-lg">
                        <div class="w-24 h-24 rounded-full bg-white flex items-center justify-center mb-6 shadow-md">
                            <i data-lucide="check" class="w-12 h-12 text-emerald-500"></i>
                        </div>
                        <h2 class="text-3xl font-bold mb-2">Approved</h2>
                        <p class="text-emerald-100 text-sm mb-10">Customer can exit the store.</p>
                        <button onclick="resetScan()" class="bg-white text-emerald-600 font-bold px-8 py-3 rounded-xl shadow-md hover:shadow-lg transition-all active:scale-95">Scan Next</button>
                    </div>
                `;
            } else if (scanResult === 'rejected') {
                mainContent = `
                    <div class="bg-orange-500 rounded-2xl p-8 text-white min-h-[500px] flex flex-col justify-center items-center text-center shadow-lg">
                        <div class="w-24 h-24 rounded-full bg-white flex items-center justify-center mb-6 shadow-md">
                            <i data-lucide="hand" class="w-12 h-12 text-orange-500"></i>
                        </div>
                        <h2 class="text-3xl font-bold mb-2">Denied</h2>
                        <p class="text-orange-100 text-sm mb-10">Please hold the customer for review.</p>
                        <button onclick="resetScan()" class="bg-white text-orange-600 font-bold px-8 py-3 rounded-xl shadow-md hover:shadow-lg transition-all active:scale-95">Scan Next</button>
                    </div>
                `;
            } else if (['used', 'invalid', 'error'].includes(scanResult)) {
                let isUsed = scanResult === 'used';
                let title = isUsed ? 'Already Used' : 'Invalid Pass';
                let msg = isUsed ? 'This pass was already scanned before.' : 'This order ID was not found.';
                if (scanResult === 'error') { title = 'Connection Error'; msg = 'Could not reach the server. Please try again.'; }

                mainContent = `
                    <div class="bg-red-500 rounded-2xl p-8 text-white min-h-[500px] flex flex-col justify-center items-center text-center shadow-lg">
                        <div class="w-24 h-24 rounded-full bg-white flex items-center justify-center mb-6 shadow-md">
                            <i data-lucide=${isUsed ? '"copy"' : '"x-circle"'} class="w-12 h-12 text-red-500"></i>
                        </div>
                        <h2 class="text-3xl font-bold mb-2">${title}</h2>
                        <p class="text-red-100 text-sm mb-4">${msg}</p>
                         ${isUsed && scannedOrder && scannedOrder.gate_pass_used_at ? `<div class="bg-black/20 rounded-xl p-3 mb-8"><p class="text-xs font-medium">First used at: ${new Date(scannedOrder.gate_pass_used_at).toLocaleTimeString('en-IN')}</p></div>` : '<div class="mb-6"></div>'}
                        <button onclick="resetScan()" class="bg-white text-red-600 font-bold px-8 py-3 rounded-xl shadow-md hover:shadow-lg transition-all active:scale-95">Try Again</button>
                    </div>
                `;
            }
            // 5. Ready State
            else {
                mainContent = `
                    <div class="bg-white rounded-2xl p-8 md:p-10 flex flex-col items-center justify-center min-h-[500px] shadow-sm">
                        <div class="w-20 h-20 bg-blue-50 rounded-2xl flex items-center justify-center mb-6">
                            <i data-lucide="scan" class="w-10 h-10 text-blue-500"></i>
                        </div>
                        <h2 class="text-2xl font-bold text-brand-text mb-1.5">Scan Gate Pass</h2>
                        <p class="text-brand-muted mb-8 max-w-[260px] text-center text-sm">Use the camera to scan a QR code, or type in the order ID below.</p>

                        <button onclick="startCamera()" class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:opacity-90 w-full max-w-sm h-12 text-white font-semibold rounded-xl flex items-center justify-center gap-2 mb-6 transition-all shadow-sm active:scale-[0.98] text-sm">
                            <i data-lucide="camera" class="w-5 h-5"></i> Open Camera
                        </button>

                        <div class="relative w-full max-w-sm flex items-center gap-2 mb-6">
                            <div class="h-px bg-slate-200 flex-1"></div>
                            <span class="text-xs text-brand-muted px-2">or enter manually</span>
                            <div class="h-px bg-slate-200 flex-1"></div>
                        </div>

                        <div class="flex gap-2 w-full max-w-sm">
                            <input type="text" id="manual-entry" placeholder="Order ID" class="flex-1 border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 rounded-xl px-4 outline-none font-mono text-center uppercase text-sm text-brand-text h-12">
                            <button onclick="verifyPass('fetch')" class="bg-brand-text hover:bg-black text-white px-6 rounded-xl font-semibold transition-all active:scale-95 h-12 text-sm">
                                Check
                            </button>
                        </div>
                    </div>
                `;
            }

            // Recent Scans
            let recentHtml = '';
            if (recentScans.length === 0) {
                recentHtml = `
                    <div class="text-center py-16 flex flex-col items-center">
                        <div class="w-14 h-14 rounded-xl bg-slate-50 flex items-center justify-center mb-3">
                            <i data-lucide="history" class="w-6 h-6 text-brand-muted/40"></i>
                        </div>
                        <p class="text-brand-muted text-sm">No scans yet today.</p>
                    </div>`;
            } else {
                recentScans.forEach(scan => {
                    let isValid = scan.result === 'valid';
                    let isRejected = scan.result === 'rejected';
                    let bg = isValid ? 'bg-emerald-50' : (isRejected ? 'bg-orange-50' : 'bg-red-50');
                    let icon = isValid ? 'check-circle' : (isRejected ? 'ban' : 'x-circle');
                    let iconColor = isValid ? 'text-emerald-500' : (isRejected ? 'text-orange-500' : 'text-red-500');

                    recentHtml += `
                        <div class="flex items-center gap-3 p-3 rounded-xl ${bg} mb-2">
                            <div class="w-8 h-8 rounded-lg bg-white flex items-center justify-center shadow-sm">
                                <i data-lucide="${icon}" class="w-4 h-4 ${iconColor}"></i>
                            </div>
                            <div class="flex-1 min-w-0">
                                <p class="font-semibold text-brand-text text-xs font-mono">#${scan.order.orderId}</p>
                                <p class="text-xs text-brand-muted mt-0.5">${new Date(scan.timestamp).toLocaleTimeString('en-IN')}</p>
                            </div>
                            <span class="font-semibold text-brand-text text-xs">Rs ${scan.order.total.toFixed(0)}</span>
                        </div>
                    `;
                });
            }

            container.innerHTML = `
                <div class="grid lg:grid-cols-7 gap-6 items-start">
                    <div class="lg:col-span-4 fade-in-up">
                        ${mainContent}
                    </div>
                    <div class="lg:col-span-3 bg-white rounded-2xl p-6 shadow-sm h-[500px] flex flex-col fade-in-up">
                        <h3 class="font-bold text-brand-text text-sm mb-4 flex items-center justify-between">
                            <span class="flex items-center gap-2"><i data-lucide="history" class="w-4 h-4 text-blue-500"></i> Recent Scans</span>
                            <span class="text-xs text-brand-muted font-normal">${recentScans.length} today</span>
                        </h3>
                        <div class="overflow-y-auto flex-1 custom-scrollbar">${recentHtml}</div>
                    </div>
                </div>
            `;

            lucide.createIcons();

            const input = document.getElementById('manual-entry');
            if (input) {
                input.focus();
                input.addEventListener('keypress', (e) => { if (e.key === 'Enter') verifyPass('fetch'); });
            }
        }
    </script>
</body>
</html>
