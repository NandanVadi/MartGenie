{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Console - MartGenie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>

<body class="min-h-screen text-slate-800 relative overflow-x-hidden bg-slate-50">
    <div class="pointer-events-none fixed -top-24 -left-20 w-80 h-80 rounded-full bg-teal-200/35 blur-3xl"></div>
    <div class="pointer-events-none fixed -bottom-24 -right-20 w-80 h-80 rounded-full bg-blue-200/30 blur-3xl"></div>

    <div class="bg-white/85 backdrop-blur-md border-b border-slate-200 p-4 md:p-6 sticky top-0 z-20">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div
                    class="w-9 h-9 rounded-xl bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center shadow-md shadow-emerald-200">
                    <i data-lucide="shopping-bag" class="text-white w-5 h-5"></i>
                </div>
                <h1 class="text-xl font-extrabold text-slate-900 tracking-tight">Mart<span
                        class="text-emerald-600">Genie</span></h1>
            </div>
            <div class="text-right">
                <p class="text-sm text-slate-500">Security Console</p>
                <p class="font-semibold text-slate-900">Exit Gate</p>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto p-4 md:p-6 relative z-10" id="main-container">
        <!-- Content will be injected by JS -->
    </div>

    <script>
        let scanResult = null;
        let scannedOrder = null;
        let isScanning = false;
        let isCameraActive = false; // Track if camera UI is shown
        let recentScans = [];
        let currentQrData = null;
        let html5QrCode = null;

        window.addEventListener('load', render);

        async function startCamera() {
            isCameraActive = true;
            render();

            // Wait for DOM update
            await new Promise(r => setTimeout(r, 100));

            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            html5QrCode = new Html5Qrcode("reader");

            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
                .catch(err => {
                    console.error("Error starting camera", err);
                    alert("Could not start camera. Please check permissions.");
                    stopCamera();
                });
        }

        function stopCamera() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    html5QrCode.clear();
                    html5QrCode = null;
                }).catch(err => console.error(err));
            }
            isCameraActive = false;
            render();
        }

        function onScanSuccess(decodedText, decodedResult) {
            // Stop camera on success and verify
            stopCamera();

            // Set input value just for visual or direct use
            currentQrData = decodedText;
            verifyPass('fetch');
        }

        async function verifyPass(action = 'fetch', decision = null) {
            const input = document.getElementById('manual-entry');
            let qrData = currentQrData;

            if (action === 'fetch' && !qrData) {
                // If coming from manual button
                if (input && input.value.trim()) {
                    qrData = input.value.trim();
                    currentQrData = qrData;
                } else {
                    return; // No data
                }
            }

            isScanning = true;
            render();

            try {
                const payload = { qr_data: qrData, action: action };
                if (decision) payload.decision = decision;

                const response = await fetch("{% url 'verify_pass' %}", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (action === 'fetch') {
                    if (data.status === 'review') {
                        scanResult = 'review';
                        scannedOrder = {
                            orderId: data.order_id,
                            total: parseFloat(data.amount),
                            items: data.items.map(i => ({ name: i.product_name, quantity: i.quantity }))
                        };
                    } else if (data.status === 'used') {
                        scanResult = 'used';
                        scannedOrder = {
                            gate_pass_used_at: data.time,
                            orderId: data.order_id,
                            total: parseFloat(data.amount || 0),
                            items: data.items ? data.items.map(i => ({ name: i.product_name, quantity: i.quantity })) : []
                        };
                    } else {
                        scanResult = data.status; // invalid, error
                    }
                } else if (action === 'decide') {
                    if (data.status === 'approved') {
                        scanResult = 'approved';
                        recentScans.unshift({ order: scannedOrder, result: 'valid', timestamp: new Date().toISOString() });
                    } else if (data.status === 'rejected') {
                        scanResult = 'rejected';
                        recentScans.unshift({ order: scannedOrder, result: 'rejected', timestamp: new Date().toISOString() });
                    }
                }

                if (recentScans.length > 10) recentScans = recentScans.slice(0, 10);

            } catch (error) {
                console.error('Verification failed:', error);
                scanResult = 'error';
            }

            isScanning = false;
            render();
        }

        function resetScan() {
            scanResult = null;
            scannedOrder = null;
            currentQrData = null;
            render();
        }

        function render() {
            const container = document.getElementById('main-container');
            let mainContent = '';

            // 1. Camera Scanning Mode
            if (isCameraActive) {
                mainContent = `
                    <div class="glass-card rounded-2xl overflow-hidden p-6 flex flex-col items-center justify-center min-h-[500px]">
                        <h2 class="text-xl font-bold mb-4">Scanning...</h2>
                        <div id="reader" style="width: 100%; max-width: 500px;"></div>
                        <button onclick="stopCamera()" class="mt-6 bg-slate-200 hover:bg-slate-300 px-6 py-2 rounded-lg font-semibold">Cancel</button>
                    </div>
                `;
            }
            // 2. Loading State
            else if (isScanning) {
                mainContent = `
                    <div class="glass-card rounded-2xl overflow-hidden p-6 flex flex-col items-center justify-center min-h-[500px]">
                        <div class="w-16 h-16 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                        <p class="text-slate-600">Processing...</p>
                    </div>
                `;
            }
            // 3. Review State (Fetch Success)
            else if (scanResult === 'review') {
                mainContent = `
                    <div class="bg-blue-500 rounded-2xl overflow-hidden p-8 md:p-12 text-white min-h-[500px] flex flex-col justify-center items-center">
                        <h2 class="text-3xl font-bold mb-2">VERIFY BILL</h2>
                        <p class="text-blue-100 mb-6">Review items before approving exit.</p>

                        <div class="bg-white/10 rounded-xl p-4 w-full max-w-md mb-6">
                            <div class="flex justify-between mb-2"><span class="text-blue-100">Order ID</span><span class="font-semibold">${scannedOrder.orderId}</span></div>
                            <div class="flex justify-between mb-2"><span class="text-blue-100">Amount</span><span class="font-semibold">Rs ${scannedOrder.total.toFixed(2)}</span></div>
                            <div class="flex justify-between"><span class="text-blue-100">Items</span><span class="font-semibold">${scannedOrder.items.length}</span></div>
                        </div>

                        <div class="w-full max-w-md mb-8 max-h-48 overflow-y-auto bg-black/20 rounded-lg p-2">
                             ${scannedOrder.items.map(item => `
                                <div class="flex justify-between text-sm text-white border-b border-white/10 last:border-0 py-2 px-2">
                                    <span>${item.name}</span>
                                    <span class="font-semibold">x${item.quantity}</span>
                                </div>
                            `).join('')}
                        </div>

                        <div class="flex gap-4 w-full max-w-md">
                            <button onclick="verifyPass('decide', 'REJECTED')" class="flex-1 bg-red-600 hover:bg-red-700 py-4 rounded-xl font-bold transition-all shadow-lg hover:shadow-xl flex items-center justify-center">
                                <i data-lucide="x" class="mr-2 w-5 h-5"></i> REJECT
                            </button>
                            <button onclick="verifyPass('decide', 'APPROVED')" class="flex-1 bg-emerald-600 hover:bg-emerald-500 py-4 rounded-xl font-bold transition-all shadow-lg hover:shadow-xl flex items-center justify-center">
                                <i data-lucide="check" class="mr-2 w-5 h-5"></i> ACCEPT
                            </button>
                        </div>
                    </div>
                `;
            }
            // 4. Result States
            else if (scanResult === 'approved') {
                mainContent = `
                    <div class="bg-emerald-500 rounded-2xl overflow-hidden p-8 text-white min-h-[500px] flex flex-col justify-center items-center text-center">
                        <div class="w-24 h-24 rounded-full bg-white/20 flex items-center justify-center mb-6"><i data-lucide="check-circle-2" class="w-14 h-14"></i></div>
                        <h2 class="text-3xl font-bold mb-2">APPROVED</h2>
                        <p class="text-emerald-100 mb-8">Gate pass logged. Customer may exit.</p>
                        <button onclick="resetScan()" class="bg-white text-emerald-700 font-bold px-8 py-3 rounded-xl hover:bg-emerald-50 transition-colors">Scan Next</button>
                    </div>
                `;
            } else if (scanResult === 'rejected') {
                mainContent = `
                    <div class="bg-orange-500 rounded-2xl overflow-hidden p-8 text-white min-h-[500px] flex flex-col justify-center items-center text-center">
                        <div class="w-24 h-24 rounded-full bg-white/20 flex items-center justify-center mb-6"><i data-lucide="ban" class="w-14 h-14"></i></div>
                        <h2 class="text-3xl font-bold mb-2">REJECTED</h2>
                        <p class="text-orange-100 mb-8">Exit denied. Please check items.</p>
                        <button onclick="resetScan()" class="bg-white text-orange-700 font-bold px-8 py-3 rounded-xl hover:bg-orange-50 transition-colors">Scan Next</button>
                    </div>
                `;
            } else if (['used', 'invalid', 'error'].includes(scanResult)) {
                let isUsed = scanResult === 'used';
                let title = isUsed ? 'ALREADY USED' : 'INVALID PASS';
                let msg = isUsed ? 'Pass already scanned.' : 'Order ID not found.';
                if (scanResult === 'error') { title = 'ERROR'; msg = 'System error.'; }

                mainContent = `
                    <div class="bg-red-500 rounded-2xl overflow-hidden p-8 text-white min-h-[500px] flex flex-col justify-center items-center text-center">
                        <div class="w-24 h-24 rounded-full bg-white/20 flex items-center justify-center mb-6"><i data-lucide="x-circle" class="w-14 h-14"></i></div>
                        <h2 class="text-3xl font-bold mb-2">${title}</h2>
                        <p class="text-red-100 mb-6">${msg}</p>
                         ${isUsed && scannedOrder && scannedOrder.gate_pass_used_at ? `<div class="bg-white/10 rounded-xl p-3 mb-6"><p class="text-sm">Used at: ${new Date(scannedOrder.gate_pass_used_at).toLocaleTimeString('en-IN')}</p></div>` : ''}
                        <button onclick="resetScan()" class="bg-white text-red-700 font-bold px-8 py-3 rounded-xl hover:bg-red-50 transition-colors">Try Again</button>
                    </div>
                `;
            }
            // 5. Default State (Ready to Scan)
            else {
                mainContent = `
                    <div class="glass-card rounded-2xl overflow-hidden p-8 md:p-12 flex flex-col items-center justify-center min-h-[500px] border border-slate-200">
                        <div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mb-6">
                            <i data-lucide="scan-line" class="w-10 h-10 text-slate-400"></i>
                        </div>
                        <h2 class="text-2xl font-bold text-slate-800 mb-2">Verify Gate Pass</h2>
                        <p class="text-slate-500 mb-8 max-w-xs text-center">Scan the customer's QR code or enter Order ID manually.</p>

                        <button onclick="startCamera()" class="bg-emerald-500 hover:bg-emerald-600 w-full max-w-sm h-14 text-white text-lg font-semibold rounded-xl flex items-center justify-center gap-2 mb-6 transition-all shadow-md hover:shadow-lg">
                            <i data-lucide="camera" class="w-5 h-5"></i> Scan with Camera
                        </button>

                        <div class="relative w-full max-w-sm flex items-center gap-2">
                            <div class="h-px bg-slate-200 flex-1"></div>
                            <span class="text-xs text-slate-400 uppercase font-bold">Or</span>
                            <div class="h-px bg-slate-200 flex-1"></div>
                        </div>

                        <div class="flex gap-2 w-full max-w-sm mt-6">
                            <input type="text" id="manual-entry" placeholder="Enter Order ID" class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-emerald-500 font-mono text-center uppercase">
                            <button onclick="verifyPass('fetch')" class="bg-slate-800 hover:bg-slate-900 text-white px-6 rounded-xl font-semibold transition-colors">
                                Check
                            </button>
                        </div>
                    </div>
                `;
            }

            // Recent Scans Sidebar
            let recentHtml = '';
            if (recentScans.length === 0) {
                recentHtml = `<div class="text-center py-12 text-slate-400"><p>No recent scans</p></div>`;
            } else {
                recentScans.forEach(scan => {
                    let isValid = scan.result === 'valid';
                    let isRejected = scan.result === 'rejected';
                    let bg = isValid ? 'bg-emerald-50 border-emerald-200' : (isRejected ? 'bg-orange-50 border-orange-200' : 'bg-red-50 border-red-200');
                    let icon = isValid ? 'check-circle-2' : (isRejected ? 'ban' : 'x-circle');
                    let iconColor = isValid ? 'text-emerald-600' : (isRejected ? 'text-orange-600' : 'text-red-600');

                    recentHtml += `
                        <div class="flex items-center gap-3 p-3 rounded-xl border ${bg} mb-2">
                            <i data-lucide="${icon}" class="w-5 h-5 ${iconColor}"></i>
                            <div class="flex-1 min-w-0">
                                <p class="font-semibold text-slate-900 truncate">${scan.order.orderId}</p>
                                <p class="text-xs text-slate-500">${new Date(scan.timestamp).toLocaleTimeString('en-IN')}</p>
                            </div>
                            <span class="font-bold text-slate-700 text-sm">Rs ${scan.order.total.toFixed(0)}</span>
                        </div>
                    `;
                });
            }

            container.innerHTML = `
                <div class="grid md:grid-cols-2 gap-6 items-start">
                    ${mainContent}
                    <div class="glass-card rounded-2xl p-6 border border-slate-200 max-h-[600px] overflow-hidden flex flex-col">
                        <h3 class="font-bold text-slate-700 mb-4 flex items-center gap-2"><i data-lucide="history" class="w-5 h-5"></i> Recent Scans</h3>
                        <div class="overflow-y-auto flex-1 pr-1 custom-scrollbar">${recentHtml}</div>
                    </div>
                </div>
            `;

            lucide.createIcons();

            // Auto-focus manual input if present
            const input = document.getElementById('manual-entry');
            if (input) {
                input.focus();
                input.addEventListener('keypress', (e) => { if (e.key === 'Enter') verifyPass('fetch'); });
            }
        }
    </script>
</body>

</html>
