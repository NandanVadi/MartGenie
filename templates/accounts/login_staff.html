{% extends 'base.html' %}

{% block content %}
<section class="role-selection">
    <div class="container">
        <div class="role-card admin-card" style="max-width: 400px; margin: 0 auto;">
            <div class="icon">🛡️</div>
            <h1 class="page-title" style="font-size: 2rem;">Staff Login</h1>
            <p class="page-subtitle" style="margin-bottom: 2rem;">Admin & Security Portal</p>

            <form method="post" style="width: 100%;">
                {% csrf_token %}
                {% if error %}
                <div
                    style="background: rgba(255, 64, 129, 0.2); color: #ff4081; padding: 1rem; border-radius: var(--radius); margin-bottom: 1.5rem; border: 1px solid #ff4081;">
                    {{ error }}
                </div>
                {% endif %}

                <div style="margin-bottom: 1rem;">
                    <input type="text" name="username" placeholder="User ID / Username" required
                        style="width: 100%; padding: 1rem; border-radius: var(--radius); border: var(--glass-border); background: rgba(255,255,255,0.05); color: var(--white); font-size: 1rem;">
                </div>

                <div style="margin-bottom: 1.5rem;">
                    <input type="password" name="password" placeholder="Password" required
                        style="width: 100%; padding: 1rem; border-radius: var(--radius); border: var(--glass-border); background: rgba(255,255,255,0.05); color: var(--white); font-size: 1rem;">
                </div>

                <button type="submit" class="btn btn-secondary" style="width: 100%;">Login</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
