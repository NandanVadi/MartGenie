{% extends 'base.html' %}

{% block content %}
<section class="role-selection">
    <div class="container">
        <div class="role-card customer-card" style="max-width: 400px; margin: 0 auto;">
            <div class="icon">📱</div>
            <h1 class="page-title" style="font-size: 2rem;">Customer Login</h1>
            <p class="page-subtitle" style="margin-bottom: 2rem;">Type your number</p>

            {% if messages %}
            {% for message in messages %}
            <div
                style="background: rgba(255, 64, 129, 0.2); color: #ff4081; padding: 1rem; border-radius: var(--radius); margin-bottom: 1.5rem; border: 1px solid #ff4081; text-align: center;">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}

            <form method="post" style="width: 100%;">
                {% csrf_token %}
                <div style="margin-bottom: 1.5rem;">
                    <input type="tel" name="phone_number" placeholder="Type your number" required
                        style="width: 100%; padding: 1rem; border-radius: var(--radius); border: var(--glass-border); background: rgba(255,255,255,0.05); color: var(--white); font-size: 1rem;">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Get OTP</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
