{% extends 'base.html' %}

{% block content %}
<section class="role-selection">
    <div class="container">
        <h1 class="page-title">Login Portal</h1>
        <p class="page-subtitle">Select your role to login</p>

        <div class="roles-grid">
            <div class="role-card customer-card">
                <div class="icon">🛍️</div>
                <h2>Customer</h2>
                <a href="{% url 'customer_login' %}" class="btn btn-primary">Login with Phone</a>
            </div>

            <div class="role-card admin-card">
                <div class="icon">⚙️</div>
                <h2>Staff</h2>
                <a href="#" class="btn btn-secondary">Staff Login</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
