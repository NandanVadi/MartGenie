{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Security Guard Login - MartGenie</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            base: '#f8fafc', text: '#0f172a', muted: '#64748b',
                            primary: '#2563eb', accent: '#3b82f6', highlight: '#f1f5f9'
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="min-h-screen flex items-center justify-center px-4 py-10 text-brand-text bg-brand-base relative overflow-hidden font-sans">
    
    <!-- Shield/Blue Theme for Security -->
    <div class="fixed top-[-10%] left-[-5%] w-[50rem] h-[50rem] rounded-full bg-blue-500/10 blur-[120px] pointer-events-none -z-10 animate-pulse"></div>
    <div class="fixed top-[40%] right-[-10%] w-[40rem] h-[40rem] rounded-full bg-indigo-500/10 blur-[120px] pointer-events-none -z-10 animate-pulse"></div>

    <div class="w-full max-w-md p-8 sm:p-10 rounded-[2.5rem] bg-white/70 backdrop-blur-3xl border border-white shadow-[0_8px_30px_rgb(0,0,0,0.06)] relative z-10 fade-in-up">
        
        <div class="text-center mb-8">
            <div class="mx-auto w-20 h-20 rounded-[1.5rem] bg-gradient-to-br from-blue-600 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-500/30 mb-5">
                <i data-lucide="shield-check" class="w-10 h-10 text-white"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-brand-text tracking-tight">
                Gate<span class="text-blue-600">Sync</span>
            </h1>
            <p class="text-brand-muted font-bold text-xs uppercase tracking-widest mt-2">Security Enforcement</p>
        </div>

        <form class="space-y-5" action="{% url 'security_login_post' %}" method="POST">
            {% csrf_token %}
            {% if error %}
            <div class="bg-red-50/80 backdrop-blur-md rounded-2xl p-4 border border-red-100 flex items-center gap-3">
                <i data-lucide="shield-alert" class="w-5 h-5 text-red-500"></i>
                <p class="text-red-500 text-sm font-semibold">{{ error }}</p>
            </div>
            {% endif %}
            
            <div class="space-y-1.5">
                <label for="guardUsername" class="text-xs font-bold text-brand-muted uppercase tracking-wider ml-1">Guard Identifier</label>
                <div class="relative">
                    <i data-lucide="user" class="w-5 h-5 text-brand-muted absolute left-4 top-1/2 -translate-y-1/2"></i>
                    <input id="guardUsername" name="username" type="text" placeholder="Enter ID"
                        class="w-full h-14 pl-12 pr-4 rounded-2xl border-2 border-white bg-white/50 focus:bg-white focus:border-brand-primary focus:ring-4 focus:ring-brand-accent/10 outline-none transition-all font-medium placeholder-brand-muted/70"
                        required />
                </div>
            </div>

            <div class="space-y-1.5">
                <label for="guardPassword" class="text-xs font-bold text-brand-muted uppercase tracking-wider ml-1">Keycode</label>
                <div class="relative">
                    <i data-lucide="key" class="w-5 h-5 text-brand-muted absolute left-4 top-1/2 -translate-y-1/2"></i>
                    <input id="guardPassword" name="password" type="password" placeholder="••••••••"
                        class="w-full h-14 pl-12 pr-4 rounded-2xl border-2 border-white bg-white/50 focus:bg-white focus:border-brand-primary focus:ring-4 focus:ring-brand-accent/10 outline-none transition-all font-medium placeholder-brand-muted/70"
                        required />
                </div>
            </div>

            <button type="submit"
                class="w-full h-14 mt-4 bg-gradient-to-br from-blue-600 to-indigo-600 hover:opacity-90 text-white font-bold rounded-2xl shadow-lg shadow-blue-500/30 transition-all active:scale-[0.98] flex items-center justify-center gap-2 group">
                Activate Post
                <i data-lucide="power" class="w-5 h-5"></i>
            </button>
        </form>

        <div class="mt-8 text-center pt-6 border-t border-brand-highlight/50 flex flex-col items-center gap-2">
            <i data-lucide="info" class="w-5 h-5 text-brand-muted/50"></i>
            <p class="text-xs font-bold uppercase tracking-widest text-brand-muted">Use the login provided by your store admin.</p>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
