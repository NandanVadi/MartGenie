{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Manager - MartGenie</title>
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            base: '#f7f9fb', text: '#191c1e', muted: '#475569',
                            primary: '#006c49', accent: '#10b981', highlight: '#f2f4f6'
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="min-h-screen text-brand-text bg-brand-base relative overflow-x-hidden font-sans">
    
    <!-- Ethereal Background Gradients -->
    <div class="fixed top-[-10%] left-[-5%] w-[50rem] h-[50rem] rounded-full bg-[#10b981]/10 blur-[120px] pointer-events-none -z-10 animate-pulse"></div>
    <div class="fixed top-[40%] right-[-10%] w-[40rem] h-[40rem] rounded-full bg-blue-500/10 blur-[120px] pointer-events-none -z-10 animate-pulse"></div>

    <div class="max-w-5xl mx-auto p-4 md:p-8 relative z-10">
        
        <!-- Header -->
        <header class="flex items-center justify-between mb-10 bg-white/60 backdrop-blur-2xl p-6 rounded-[2rem] border border-white shadow-[0_8px_30px_rgb(0,0,0,0.04)] fade-in-up">
            <h1 class="text-2xl font-extrabold text-brand-text flex items-center gap-4 tracking-tight">
                <div class="w-12 h-12 bg-gradient-to-br from-brand-primary to-brand-accent rounded-[1rem] flex items-center justify-center text-white shadow-lg shadow-brand-accent/30">
                    <i data-lucide="packages" class="w-6 h-6"></i>
                </div>
                Inventory
            </h1>
            <a href="{% url 'dashboard' %}"
                class="bg-brand-highlight text-brand-text px-5 py-2.5 rounded-full font-bold hover:bg-slate-200 flex items-center gap-2 transition-colors border border-white">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Dashboard
            </a>
        </header>

        <!-- Low Stock Alerts -->
        <div id="low-stock-alerts" class="mb-8 hidden fade-in-up delay-100">
            <div class="bg-red-50/80 backdrop-blur-xl p-6 rounded-[2rem] border border-red-100 shadow-[0_8px_30px_rgba(239,68,68,0.1)]">
                <div class="flex items-center gap-3 mb-3">
                    <div class="w-8 h-8 rounded-full bg-red-100 flex items-center justify-center">
                         <i data-lucide="alert-triangle" class="w-4 h-4 text-red-600"></i>
                    </div>
                    <h2 class="font-extrabold text-red-700 tracking-tight text-lg">Low Stock Alert</h2>
                </div>
                <div id="low-stock-list" class="text-sm font-semibold text-red-600 space-y-2 pl-11"></div>
            </div>
        </div>

        <div class="grid md:grid-cols-5 gap-8 fade-in-up delay-200">
            
            <!-- Scanner Section -->
            <div class="md:col-span-2 bg-gradient-to-b from-slate-900 to-slate-950 p-6 md:p-8 rounded-[2.5rem] border border-slate-800 shadow-[0_20px_50px_rgba(0,0,0,0.2)] text-white relative overflow-hidden">
                <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-brand-primary/20 via-transparent to-transparent pointer-events-none"></div>

                <h2 class="font-bold text-lg mb-6 flex items-center gap-2 z-10 relative text-brand-highlight">
                    <i data-lucide="scan-barcode" class="w-5 h-5 text-brand-accent"></i> Scan Barcode
                </h2>

                <div id="reader" class="rounded-[2rem] overflow-hidden mb-6 border-[3px] border-slate-700 bg-black z-10 relative"></div>

                <div class="flex items-center gap-3 mb-6 relative z-10">
                    <div class="h-px bg-slate-800 flex-1"></div>
                    <span class="text-[10px] text-slate-500 font-extrabold uppercase tracking-[0.2em]">Manual Entry</span>
                    <div class="h-px bg-slate-800 flex-1"></div>
                </div>

                <div class="flex gap-3 relative z-10">
                    <div class="flex-1 relative">
                        <input
                            type="text"
                            id="manual-barcode"
                            placeholder="Barcode number"
                            oninput="debouncedCheck(this.value)"
                            class="w-full bg-white/5 border border-white/10 text-white rounded-2xl px-5 py-3.5 outline-none focus:ring-2 focus:ring-brand-accent transition-all font-mono font-bold text-sm h-14"
                        >
                        <span id="barcode-typing-indicator" class="hidden absolute right-4 top-4 text-brand-accent">
                            <i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>
                        </span>
                    </div>
                    <button onclick="checkProduct(document.getElementById('manual-barcode').value.trim())"
                        class="bg-brand-accent hover:bg-brand-primary text-slate-900 px-6 rounded-2xl font-black transition-all shadow-[0_0_20px_rgba(16,185,129,0.2)] h-14 w-16 flex items-center justify-center">
                        <i data-lucide="corner-down-left" class="w-6 h-6"></i>
                    </button>
                </div>

                <p class="text-[10px] text-slate-400 mt-5 font-bold uppercase tracking-widest flex items-start gap-2 relative z-10">
                    <i data-lucide="info" class="w-4 h-4 text-slate-500 flex-shrink-0"></i>
                    Type a barcode above to look up the product.
                </p>

                <button id="start-scan-btn" onclick="startScanner()"
                    class="w-full mt-6 bg-gradient-to-r from-brand-primary to-brand-accent text-white py-4 rounded-2xl font-bold hover:opacity-90 transition shadow-lg shadow-brand-accent/30 flex items-center justify-center gap-2 relative z-10 active:scale-[0.98]">
                    <i data-lucide="camera" class="w-5 h-5"></i> Open Camera
                </button>
                <button id="stop-scan-btn" onclick="stopScanner()"
                    class="w-full mt-6 bg-red-500/10 border border-red-500/20 text-red-400 py-4 rounded-2xl font-bold hover:bg-red-500/20 transition hidden flex items-center justify-center gap-2 relative z-10 active:scale-[0.98]">
                    <i data-lucide="camera-off" class="w-5 h-5"></i> Stop Camera
                </button>
            </div>

            <!-- Action Section -->
            <div id="action-panel"
                class="md:col-span-3 bg-white/60 backdrop-blur-2xl p-8 rounded-[2.5rem] flex items-center justify-center text-center min-h-[500px] border border-white shadow-[0_8px_30px_rgb(0,0,0,0.04)] relative overflow-hidden">
                <div class="text-brand-muted">
                    <div class="w-24 h-24 bg-brand-highlight rounded-[2rem] flex items-center justify-center mx-auto mb-6 shadow-inner border border-white">
                        <i data-lucide="database" class="w-10 h-10 text-brand-muted opacity-50"></i>
                    </div>
                    <h3 class="font-extrabold text-xl mb-2 text-brand-text tracking-tight">Ready</h3>
                    <p class="font-medium text-sm px-10">Scan or type a barcode to find the product.</p>
                </div>
            </div>
            
        </div>
    </div>

    <script>
        lucide.createIcons();

        // ── Low stock alerts ──────────────────────────────────────────────────
        async function loadLowStockAlerts() {
            try {
                const response = await fetch('/inventory/low-stock/');
                const data = await response.json();

                if (data.count > 0) {
                    const container = document.getElementById('low-stock-list');
                    const panel = document.getElementById('low-stock-alerts');
                    container.innerHTML = '';
                    data.items.forEach(item => {
                        const row = document.createElement('div');
                        row.className = "flex justify-between items-center bg-red-100/50 p-2 rounded-xl mb-1";
                        row.innerHTML = `<span class="font-bold">${item.product_name}</span> <span class="bg-red-200 text-red-800 px-2 py-0.5 rounded-lg text-xs">Stock: ${item.quantity} (Min: ${item.threshold})</span>`;
                        container.appendChild(row);
                    });
                    panel.classList.remove('hidden');
                }
            } catch (err) {
                console.log("Low stock alert load failed", err);
            }
        }
        loadLowStockAlerts();

        let html5QrCode;
        let currentBarcode = null;

        let debounceTimer;
        function debouncedCheck(val) {
            const indicator = document.getElementById('barcode-typing-indicator');
            clearTimeout(debounceTimer);
            val = val.trim();
            if (val.length < 4) {
                indicator.classList.add('hidden');
                return;
            }
            indicator.classList.remove('hidden');
            debounceTimer = setTimeout(() => {
                indicator.classList.add('hidden');
                checkProduct(val);
            }, 700);
        }

        function renderAvailable(product) {
            const panel = document.getElementById('action-panel');
            panel.innerHTML = `
                <div class="w-full text-left fade-in-up h-full flex flex-col">
                    
                    <div class="flex items-center justify-between mb-6 pb-6 border-b border-white">
                        <div class="flex items-center gap-5">
                            <div class="w-20 h-20 bg-white rounded-[1.25rem] flex items-center justify-center shadow-sm border border-slate-100 shrink-0 overflow-hidden">
                                ${product.image ? `<img src="${product.image}" class="w-full h-full object-cover">` : `<i data-lucide="package" class="w-10 h-10 text-brand-muted opacity-30"></i>`}
                            </div>
                            <div>
                                <p class="text-[10px] font-black uppercase tracking-widest text-brand-muted mb-1 bg-brand-highlight inline-block px-2 py-0.5 rounded-md border border-white">Product Found</p>
                                <h3 class="text-2xl font-black text-brand-text tracking-tight">${product.name}</h3>
                                <p class="text-brand-primary font-bold mt-1 tracking-tight">₹${product.price.toFixed(2)}</p>
                            </div>
                        </div>
                        <div class="text-right">
                             <p class="text-[10px] font-black uppercase tracking-widest text-brand-muted mb-1">In Stock</p>
                             <div class="text-3xl font-black text-brand-text bg-white px-4 py-1 rounded-xl shadow-inner border border-slate-100">${product.current_stock}</div>
                        </div>
                    </div>

                    <h4 class="text-xs font-black uppercase tracking-[0.1em] text-brand-muted mb-4 flex items-center gap-2"><i data-lucide="plus-square" class="w-4 h-4"></i> Update Stock</h4>
                    
                    <div class="grid grid-cols-3 gap-3 mb-4">
                        <button onclick="updateStock(1)" class="bg-white hover:bg-brand-highlight border-b-4 border-emerald-500 text-emerald-600 py-4 rounded-2xl font-black transition-all shadow-sm">+1</button>
                        <button onclick="updateStock(5)" class="bg-white hover:bg-brand-highlight border-b-4 border-emerald-500 text-emerald-600 py-4 rounded-2xl font-black transition-all shadow-sm">+5</button>
                        <button onclick="updateStock(10)" class="bg-white hover:bg-brand-highlight border-b-4 border-emerald-500 text-emerald-600 py-4 rounded-2xl font-black transition-all shadow-sm">+10</button>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3 mb-8">
                         <button onclick="updateStock(-1)" class="bg-white hover:bg-brand-highlight border-b-4 border-orange-500 text-orange-600 py-4 rounded-2xl font-black transition-all shadow-sm border border-orange-100">-1 (Return)</button>
                         <button onclick="updateStock(-5)" class="bg-white hover:bg-brand-highlight border-b-4 border-red-500 text-red-600 py-4 rounded-2xl font-black transition-all shadow-sm border border-red-100">-5 (Damage)</button>
                    </div>

                    <div class="mt-auto pt-6 border-t border-white">
                        <label class="text-[10px] font-black uppercase tracking-widest text-brand-muted mb-2 block">Set Exact Quantity</label>
                        <div class="flex gap-3">
                            <input type="number" id="exact-qty" class="flex-1 border-2 border-white bg-white/50 rounded-2xl px-5 py-3 outline-none focus:border-brand-primary focus:bg-white font-mono font-bold" placeholder="Enter quantity">
                            <button onclick="setExactStock(parseInt(document.getElementById('exact-qty').value) - ${product.current_stock})" class="bg-brand-text text-white px-8 rounded-2xl font-black hover:bg-black shadow-[0_4px_10px_rgba(0,0,0,0.1)] active:scale-95 transition-all">SET</button>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function renderCreate(barcode, prefill = null) {
            const panel = document.getElementById('action-panel');

            const categoryOptions = ['Food', 'Beverages', 'Personal Care', 'Household', 'Snacks'];
            const apiCat = (prefill?.category || '').toLowerCase();
            let selectedCategory = 'Food';
            if (apiCat.includes('beverage') || apiCat.includes('drink') || apiCat.includes('juice') || apiCat.includes('water') || apiCat.includes('soda')) selectedCategory = 'Beverages';
            else if (apiCat.includes('snack') || apiCat.includes('chips') || apiCat.includes('biscuit') || apiCat.includes('cracker')) selectedCategory = 'Snacks';
            else if (apiCat.includes('care') || apiCat.includes('hygiene') || apiCat.includes('beauty') || apiCat.includes('soap') || apiCat.includes('shampoo')) selectedCategory = 'Personal Care';
            else if (apiCat.includes('household') || apiCat.includes('cleaning') || apiCat.includes('detergent') || apiCat.includes('tissue')) selectedCategory = 'Household';

            const categoryOpts = categoryOptions.map(c => `<option ${c === selectedCategory ? 'selected' : ''}>${c}</option>`).join('');

            const sourceBadge = prefill?.source
                ? `<p class="text-[10px] font-black tracking-widest uppercase text-emerald-600 mt-2 bg-emerald-100 flex items-center gap-1 w-fit px-2 py-0.5 rounded-md"><i data-lucide="cloud-download" class="w-3 h-3"></i> Retrieved via ${prefill.source}</p>` : '';

            const imagePreview = prefill?.image
                ? ` <div class="absolute right-0 top-0 w-24 h-24 bg-white rounded-bl-[2rem] rounded-tr-[2rem] border-b border-l border-white shadow-sm overflow-hidden p-2">
                        <img src="${prefill.image}" class="w-full h-full object-cover rounded-xl border border-slate-100">
                    </div>` : '';

            panel.innerHTML = `
                <div class="w-full text-left fade-in relative">
                    ${imagePreview}
                    
                    <div class="flex items-center gap-3 mb-6">
                         <div class="w-12 h-12 bg-amber-100 rounded-xl text-amber-600 flex items-center justify-center border border-amber-200">
                             <i data-lucide="code" class="w-6 h-6"></i>
                         </div>
                         <div>
                            <h3 class="font-extrabold text-amber-800 text-lg tracking-tight">New Product</h3>
                            <p class="text-xs text-amber-700/80 font-bold uppercase tracking-wider mt-0.5"><span class="font-mono bg-white px-2 rounded box-shadow-sm">${barcode}</span> is not in the system yet.</p>
                            ${sourceBadge}
                         </div>
                    </div>

                    <div class="border-t border-white pt-6 mb-6"></div>

                    <form onsubmit="createProduct(event)" class="space-y-4">
                        <div class="space-y-1.5">
                            <label class="block text-[10px] font-black text-brand-muted uppercase tracking-widest ml-1">Product Name</label>
                            <input type="text" name="name" value="${prefill?.name || ''}" required class="w-full h-14 border-2 border-white rounded-2xl px-5 focus:border-brand-primary focus:bg-white outline-none bg-white/50 font-bold text-brand-text shadow-sm transition-all focus:ring-4 focus:ring-brand-accent/10">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-1.5">
                                <label class="block text-[10px] font-black text-brand-muted uppercase tracking-widest ml-1">Price (₹)</label>
                                <input type="number" step="0.01" name="price" required class="w-full h-14 border-2 border-white rounded-2xl px-5 focus:border-brand-primary focus:bg-white outline-none bg-white/50 font-bold text-brand-text shadow-sm transition-all focus:ring-4 focus:ring-brand-accent/10 font-mono">
                            </div>
                            <div class="space-y-1.5">
                                <label class="block text-[10px] font-black text-brand-muted uppercase tracking-widest ml-1">Starting Stock</label>
                                <input type="number" name="initial_stock" value="10" required class="w-full h-14 border-2 border-white rounded-2xl px-5 focus:border-brand-primary focus:bg-white outline-none bg-white/50 font-bold text-brand-text shadow-sm transition-all focus:ring-4 focus:ring-brand-accent/10 font-mono">
                            </div>
                        </div>
                        <div class="space-y-1.5 pb-2">
                             <label class="block text-[10px] font-black text-brand-muted uppercase tracking-widest ml-1">Category</label>
                             <select name="category" class="w-full h-14 border-2 border-white rounded-2xl px-5 outline-none bg-white font-bold text-brand-text shadow-sm focus:border-brand-primary appearance-none">
                                ${categoryOpts}
                             </select>
                        </div>
                        <button type="submit" class="w-full bg-gradient-to-r from-brand-primary to-brand-accent text-white h-14 rounded-2xl font-black shadow-lg shadow-brand-accent/20 flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all"><i data-lucide="plus" class="w-5 h-5"></i> Add Product</button>
                    </form>
                </div>
             `;
            lucide.createIcons();
        }

        async function fetchExternalDetails(barcode) {
            try {
                const r = await fetch(`/products/api/barcode-lookup/${barcode}/`);
                const d = await r.json();
                if (d.found) return { name: d.name, category: d.category, image: d.image, source: d.source };
            } catch (e) {
                console.log('Backend barcode lookup failed', e);
            }
            return null;
        }

        async function checkProduct(barcode) {
            if (!barcode) return;
            currentBarcode = barcode;
            document.getElementById('manual-barcode').value = barcode;
            stopScanner();

            const panel = document.getElementById('action-panel');
            panel.innerHTML = `<div class="animate-pulse flex flex-col items-center justify-center h-full text-brand-muted fade-in-up">
                <i data-lucide="loader-2" class="w-10 h-10 animate-spin mb-4 text-brand-primary"></i>
                <p class="font-extrabold text-lg tracking-tight">Looking up product...</p>
                <p class="text-[10px] font-bold uppercase tracking-widest mt-1">Please wait</p>
            </div>`;
            lucide.createIcons();

            const response = await fetch('/products/api/inventory/', { method: 'POST', body: JSON.stringify({ action: 'fetch', barcode: barcode }) });
            const data = await response.json();

            if (data.status === 'found') {
                renderAvailable(data.product);
            } else {
                panel.innerHTML = `<div class="animate-pulse flex flex-col items-center justify-center h-full text-brand-text fade-in-up">
                    <div class="w-16 h-16 rounded-full bg-brand-primary/10 flex items-center justify-center mb-4"><i data-lucide="globe" class="w-8 h-8 text-brand-primary animate-bounce"></i></div>
                    <p class="font-extrabold text-lg tracking-tight">Searching online...</p>
                    <p class="text-[10px] font-bold uppercase tracking-widest mt-1 text-brand-muted">Fetching from Open Food Facts API...</p>
                </div>`;
                lucide.createIcons();

                const externalData = await fetchExternalDetails(barcode);
                renderCreate(barcode, externalData);
            }
        }

        async function updateStock(qty) {
            const response = await fetch('/products/api/inventory/', { method: 'POST', body: JSON.stringify({ action: 'update_stock', barcode: currentBarcode, quantity: qty }) });
            const data = await response.json();
            if (data.status === 'success') checkProduct(currentBarcode);
        }

        async function setExactStock(qty) {
            const response = await fetch('/products/api/inventory/', { method: 'POST', body: JSON.stringify({ action: 'update_stock', barcode: currentBarcode, quantity: qty }) });
            const data = await response.json();
            if (data.status === 'success') window.location.reload();
        }

        async function createProduct(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const payload = { action: 'create_product', barcode: currentBarcode, name: formData.get('name'), price: formData.get('price'), initial_stock: formData.get('initial_stock'), category: formData.get('category') };

            const response = await fetch('/products/api/inventory/', { method: 'POST', body: JSON.stringify(payload) });
            const data = await response.json();
            if (data.status === 'success') checkProduct(currentBarcode);
            else alert('Error: ' + data.message);
        }

        function onScanSuccess(decodedText) { checkProduct(decodedText); }

        function startScanner() {
            document.getElementById('start-scan-btn').classList.add('hidden');
            document.getElementById('stop-scan-btn').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");

            const config = { fps: 20, qrbox: { width: 250, height: 180 }, aspectRatio: 1.0, formatsToSupport: [ Html5QrcodeSupportedFormats.EAN_13, Html5QrcodeSupportedFormats.UPC_A, Html5QrcodeSupportedFormats.CODE_128, Html5QrcodeSupportedFormats.QR_CODE ] };
            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    html5QrCode.clear();
                    html5QrCode = null;
                    document.getElementById('start-scan-btn').classList.remove('hidden');
                    document.getElementById('stop-scan-btn').classList.add('hidden');
                });
            }
        }
    </script>
</body>
</html>
