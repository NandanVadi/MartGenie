{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Manager - MartGenie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>

<body class="min-h-screen text-slate-800 relative overflow-x-hidden">
    <!-- Decorative Blobs -->
    <div class="pointer-events-none fixed -top-24 -left-20 w-80 h-80 rounded-full bg-teal-200/35 blur-3xl"></div>
    <div class="pointer-events-none fixed -bottom-24 -right-20 w-80 h-80 rounded-full bg-blue-200/30 blur-3xl"></div>

    <div class="max-w-4xl mx-auto p-4 md:p-6 relative z-10">
        <!-- Header -->
        <header class="flex items-center justify-between mb-8 glass-card p-4 rounded-2xl">
            <h1 class="text-2xl font-bold text-slate-900 flex items-center gap-2">
                <div class="w-10 h-10 bg-emerald-100 rounded-lg flex items-center justify-center text-emerald-600">
                    <i data-lucide="package" class="w-6 h-6"></i>
                </div>
                Inventory Manager
            </h1>
            <a href="{% url 'dashboard' %}"
                class="text-sm font-semibold text-slate-500 hover:text-emerald-600 flex items-center gap-1 transition-colors">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Dashboard
            </a>
        </header>
        <!-- Low Stock Alerts -->
        <div id="low-stock-alerts" class="mb-6 hidden">
            <div class="glass-card p-4 rounded-2xl border border-rose-200 bg-rose-50/70">
                <div class="flex items-center gap-2 mb-2">
                    <i data-lucide="alert-triangle" class="w-5 h-5 text-rose-600"></i>
                    <h2 class="font-bold text-rose-700">Low Stock Alerts</h2>
                </div>
                <div id="low-stock-list" class="text-sm text-rose-700 space-y-1"></div>
            </div>
        </div>
        <!-- Low Stock Alerts -->
        <div id="low-stock-alerts" class="mb-6 hidden">
            <div class="glass-card p-4 rounded-2xl border border-rose-200 bg-rose-50/70">
                <div class="flex items-center gap-2 mb-2">
                    <i data-lucide="alert-triangle" class="w-5 h-5 text-rose-600"></i>
                    <h2 class="font-bold text-rose-700">Low Stock Alerts</h2>
                </div>
                <div id="low-stock-list" class="text-sm text-rose-700 space-y-1"></div>
            </div>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <!-- Scanner Section -->
            <div class="glass-card p-6 rounded-2xl fade-in-up">
                <h2 class="font-bold text-lg mb-4 text-slate-900">Scan Product Barcode</h2>

                <div id="reader" class="rounded-xl overflow-hidden mb-4 border-2 border-slate-100"></div>

                <div class="flex items-center gap-2 mb-4">
                    <div class="h-px bg-slate-200 flex-1"></div>
                    <span class="text-xs text-slate-400 font-bold uppercase">Or Enter Manually</span>
                    <div class="h-px bg-slate-200 flex-1"></div>
                </div>

                <div class="flex gap-2">
                    <input type="text" id="manual-barcode" placeholder="Enter Barcode"
                        class="flex-1 border border-slate-200 rounded-xl px-4 py-2 bg-white/50 outline-none focus:ring-2 focus:ring-emerald-500 transition-all">
                    <button onclick="checkProduct(document.getElementById('manual-barcode').value)"
                        class="bg-slate-800 text-white px-4 rounded-xl font-semibold hover:bg-slate-900 shadow-lg shadow-slate-200 transition-all">Check</button>
                </div>

                <button id="start-scan-btn" onclick="startScanner()"
                    class="w-full mt-4 bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-700 transition flex items-center justify-center gap-2 shadow-lg shadow-emerald-200">
                    <i data-lucide="camera" class="w-5 h-5"></i> Start Camera
                </button>
                <button id="stop-scan-btn" onclick="stopScanner()"
                    class="w-full mt-4 bg-rose-100 text-rose-600 py-3 rounded-xl font-bold hover:bg-rose-200 transition hidden flex items-center justify-center gap-2">
                    <i data-lucide="camera-off" class="w-5 h-5"></i> Stop Camera
                </button>
            </div>

            <!-- Action Section -->
            <div id="action-panel"
                class="glass-card p-6 rounded-2xl flex items-center justify-center text-center fade-in-up delay-100 min-h-[400px]">
                <div class="text-slate-400">
                    <div
                        class="w-24 h-24 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4 animate-float">
                        <i data-lucide="scan-barcode" class="w-10 h-10 text-slate-400"></i>
                    </div>
                    <p class="font-medium">Scan a product to view details or add stock.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        async function loadLowStockAlerts() {
            try {
                const response = await fetch('/inventory/low-stock/');
                const data = await response.json();

                if (data.count > 0) {
                    const container = document.getElementById('low-stock-list');
                    const panel = document.getElementById('low-stock-alerts');

                    container.innerHTML = '';

                    data.items.forEach(item => {
                        const row = document.createElement('div');
                        row.textContent = `${item.product_name} — ${item.quantity} left (threshold ${item.threshold})`;
                        container.appendChild(row);
                    });

                    panel.classList.remove('hidden');
                }
            } catch (err) {
                console.log("Low stock alert load failed", err);
            }
        }

        // Load alerts when page opens
        loadLowStockAlerts();
        async function loadLowStockAlerts() {
            try {
                const response = await fetch('/inventory/low-stock/');
                const data = await response.json();

                if (data.count > 0) {
                    const container = document.getElementById('low-stock-list');
                    const panel = document.getElementById('low-stock-alerts');

                    container.innerHTML = '';

                    data.items.forEach(item => {
                        const row = document.createElement('div');
                        row.textContent = `${item.product_name} — ${item.quantity} left (threshold ${item.threshold})`;
                        container.appendChild(row);
                    });

                    panel.classList.remove('hidden');
                }
            } catch (err) {
                console.log("Low stock alert load failed", err);
            }
        }

        // Load alerts when page opens
        loadLowStockAlerts();
        let html5QrCode;
        let currentBarcode = null;

        function renderAvailable(product) {
            const panel = document.getElementById('action-panel');
            panel.innerHTML = `
                <div class="w-full text-left fade-in">
                    <div class="flex items-start gap-4 mb-6">
                        <div class="w-20 h-20 bg-emerald-50 rounded-xl flex items-center justify-center border border-emerald-100">
                            ${product.image ? `<img src="${product.image}" class="w-full h-full object-cover rounded-xl">` : `<i data-lucide="box" class="w-10 h-10 text-emerald-300"></i>`}
                        </div>
                        <div>
                            <h3 class="text-xl font-bold text-slate-900">${product.name}</h3>
                            <p class="text-slate-500 text-sm">₹${product.price.toFixed(2)}</p>
                            <div class="mt-2 inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-emerald-100 text-emerald-800 border border-emerald-200">
                                Current Stock: ${product.current_stock}
                            </div>
                        </div>
                    </div>

                    <h4 class="font-semibold mb-3 text-slate-700 flex items-center gap-2"><i data-lucide="layers" class="w-4 h-4"></i> Update Stock</h4>
                    <div class="flex gap-2 mb-3">
                        <button onclick="updateStock(1)" class="flex-1 bg-emerald-50 text-emerald-700 py-3 rounded-xl font-bold hover:bg-emerald-100 border border-emerald-100 transition-colors">+1</button>
                        <button onclick="updateStock(5)" class="flex-1 bg-emerald-50 text-emerald-700 py-3 rounded-xl font-bold hover:bg-emerald-100 border border-emerald-100 transition-colors">+5</button>
                        <button onclick="updateStock(10)" class="flex-1 bg-emerald-50 text-emerald-700 py-3 rounded-xl font-bold hover:bg-emerald-100 border border-emerald-100 transition-colors">+10</button>
                    </div>
                    <div class="flex gap-2 mb-6">
                         <button onclick="updateStock(-1)" class="flex-1 bg-rose-50 text-rose-700 py-3 rounded-xl font-bold hover:bg-rose-100 border border-rose-100 transition-colors">-1</button>
                         <button onclick="updateStock(-5)" class="flex-1 bg-rose-50 text-rose-700 py-3 rounded-xl font-bold hover:bg-rose-100 border border-rose-100 transition-colors">-5</button>
                    </div>

                    <div class="pt-6 border-t border-slate-100">
                        <label class="text-xs font-bold text-slate-500 uppercase">Set Exact Quantity</label>
                        <div class="flex gap-2 mt-2">
                            <input type="number" id="exact-qty" class="flex-1 border border-slate-200 rounded-xl px-4 py-2 outline-none focus:border-emerald-500" placeholder="0">
                            <button onclick="setExactStock(parseInt(document.getElementById('exact-qty').value) - ${product.current_stock})" class="bg-indigo-600 text-white px-6 rounded-xl font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-100 transition-all">Set</button>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function renderCreate(barcode, prefill = null) {
            const panel = document.getElementById('action-panel');
            const nameVal = prefill ? prefill.name : '';
            // Simple mapping or auto-select category could be added, for now just name

            panel.innerHTML = `
                <div class="w-full text-left fade-in">
                    <div class="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-6 flex gap-3">
                         <div class="p-2 bg-amber-100 rounded-lg h-fit text-amber-600">
                             <i data-lucide="alert-circle" class="w-5 h-5"></i>
                         </div>
                         <div>
                            <h3 class="font-bold text-amber-900">Product Not Found</h3>
                            <p class="text-sm text-amber-700 mt-1">Barcode <span class="font-mono font-bold bg-white/50 px-1 rounded">${barcode}</span> is not in the system.</p>
                            ${prefill ? `<p class="text-xs text-emerald-600 mt-1 font-semibold flex items-center gap-1"><i data-lucide="sparkles" class="w-3 h-3"></i> Found details online! Form auto-filled.</p>` : ''}
                         </div>
                    </div>

                    <h4 class="font-bold text-lg mb-4 text-slate-900">Add New Product</h4>
                    <form onsubmit="createProduct(event)" class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Product Name</label>
                            <input type="text" name="name" value="${nameVal}" required class="w-full border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-emerald-500 outline-none bg-white/50">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Price (₹)</label>
                                <input type="number" step="0.01" name="price" required class="w-full border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-emerald-500 outline-none bg-white/50">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Initial Stock</label>
                                <input type="number" name="initial_stock" value="10" required class="w-full border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-emerald-500 outline-none bg-white/50">
                            </div>
                        </div>
                        <div>
                             <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Category</label>
                             <select name="category" class="w-full border border-slate-200 rounded-xl px-4 py-3 outline-none bg-white/50">
                                <option>Food</option>
                                <option>Beverages</option>
                                <option>Personal Care</option>
                                <option>Household</option>
                                <option>Snacks</option>
                             </select>
                        </div>
                        <button type="submit" class="w-full bg-emerald-600 text-white py-3.5 rounded-xl font-bold hover:bg-emerald-700 transition shadow-lg shadow-emerald-200 mt-2">Create Product</button>
                    </form>
                </div>
             `;
            lucide.createIcons();
        }

        async function checkProduct(barcode) {
            if (!barcode) return;
            currentBarcode = barcode;
            document.getElementById('manual-barcode').value = barcode;

            // Stop scanner to prevent double scans
            stopScanner();

            // Show local loading
            const panel = document.getElementById('action-panel');
            panel.innerHTML = `<div class="animate-pulse flex flex-col items-center justify-center h-full text-slate-400">
                <i data-lucide="loader-2" class="w-8 h-8 animate-spin mb-2"></i>
                <p>Checking inventory...</p>
            </div>`;
            lucide.createIcons();

            const response = await fetch('/products/api/inventory/', {
                method: 'POST',
                body: JSON.stringify({ action: 'fetch', barcode: barcode })
            });
            const data = await response.json();

            if (data.status === 'found') {
                renderAvailable(data.product);
            } else {
                // Show external loading
                panel.innerHTML = `<div class="animate-pulse flex flex-col items-center justify-center h-full text-emerald-600">
                    <i data-lucide="globe" class="w-8 h-8 animate-bounce mb-2"></i>
                    <p>Product not found locally.</p>
                    <p class="text-sm font-semibold">Searching global database...</p>
                </div>`;
                lucide.createIcons();

                // Try to fetch from OpenFoodFacts before rendering create form
                const externalData = await fetchExternalDetails(barcode);
                renderCreate(barcode, externalData);
            }
        }

        async function fetchExternalDetails(barcode) {
            try {
                const response = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
                const data = await response.json();
                if (data.status === 1) {
                    return {
                        name: data.product.product_name || '',
                        category: data.product.categories ? data.product.categories.split(',')[0] : '',
                        image: data.product.image_url || ''
                    };
                }
            } catch (e) {
                console.log("External fetch failed", e);
            }
            return null;
        }

        async function updateStock(qty) {
            const response = await fetch('/products/api/inventory/', {
                method: 'POST',
                body: JSON.stringify({ action: 'update_stock', barcode: currentBarcode, quantity: qty })
            });
            const data = await response.json();
            if (data.status === 'success') {
                // Refresh
                checkProduct(currentBarcode);
            }
        }

        async function setExactStock(qty) {
            const response = await fetch('/products/api/inventory/', {
                method: 'POST',
                body: JSON.stringify({ action: 'update_stock', barcode: currentBarcode, quantity: qty })
            });
            const data = await response.json();
            if (data.status === 'success') {
                window.location.reload();
            }
        }

        async function createProduct(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const payload = {
                action: 'create_product',
                barcode: currentBarcode,
                name: formData.get('name'),
                price: formData.get('price'),
                initial_stock: formData.get('initial_stock'),
                category: formData.get('category')
            };

            const response = await fetch('/products/api/inventory/', {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            if (data.status === 'success') {
                checkProduct(currentBarcode);
            } else {
                alert('Error creating product: ' + data.message);
            }
        }

        function onScanSuccess(decodedText) {
            checkProduct(decodedText);
        }

        function startScanner() {
            document.getElementById('start-scan-btn').classList.add('hidden');
            document.getElementById('stop-scan-btn').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");

            const config = {
                fps: 25,
                qrbox: { width: 250, height: 250 },
                aspectRatio: 1.0,
                formatsToSupport: [
                    Html5QrcodeSupportedFormats.EAN_13,
                    Html5QrcodeSupportedFormats.EAN_8,
                    Html5QrcodeSupportedFormats.UPC_A,
                    Html5QrcodeSupportedFormats.UPC_E,
                    Html5QrcodeSupportedFormats.CODE_128,
                    Html5QrcodeSupportedFormats.QR_CODE
                ],
                experimentalFeatures: {
                    useBarCodeDetectorIfSupported: true
                }
            };

            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    html5QrCode.clear();
                    html5QrCode = null;
                    document.getElementById('start-scan-btn').classList.remove('hidden');
                    document.getElementById('stop-scan-btn').classList.add('hidden');
                });
            }
        }
    </script>
</body>

</html>
