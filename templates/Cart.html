{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - MartGenie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>

<body class="min-h-screen flex flex-col text-slate-800 relative overflow-hidden">
    <div class="pointer-events-none fixed -top-20 -left-20 w-72 h-72 rounded-full bg-teal-200/35 blur-3xl"></div>
    <div class="pointer-events-none fixed -bottom-20 -right-20 w-80 h-80 rounded-full bg-blue-200/30 blur-3xl"></div>

    <div class="bg-white/85 backdrop-blur-md sticky top-0 z-20 border-b border-slate-200/80">
        <div class="max-w-3xl mx-auto flex items-center justify-between p-4">
            <a href="{% url 'scanner' %}" class="text-slate-700 p-2 hover:bg-slate-100 rounded-full transition-colors"
                aria-label="Back to scanner">
                <i data-lucide="arrow-left" class="h-5 w-5"></i>
            </a>
            <h1 class="font-bold text-lg text-slate-900">Your Cart</h1>
            <button onclick="clearCart()" id="clear-btn"
                class="text-red-500 hover:text-red-600 hover:bg-red-50 p-2 rounded-full transition-colors hidden"
                aria-label="Clear cart">
                <i data-lucide="trash-2" class="h-5 w-5"></i>
            </button>
            <div id="spacer" class="w-9 h-9 hidden"></div>
        </div>
    </div>

    <div class="flex-1 overflow-auto relative z-10" id="cart-container"></div>

    <div class="max-w-3xl w-full mx-auto px-4 py-3 hidden relative z-10" id="scan-more-btn">
        <a href="{% url 'scanner' %}" class="block">
            <button
                class="w-full rounded-2xl border-dashed border-2 border-emerald-300 text-emerald-700 hover:bg-emerald-50 h-12 flex items-center justify-center font-semibold transition-colors bg-white/75">
                <i data-lucide="scan-line" class="mr-2 h-4 w-4"></i>
                Scan More Items
            </button>
        </a>
    </div>

    <div id="checkout-section"
        class="bg-white/90 backdrop-blur-md border-t border-slate-200 p-4 space-y-4 hidden fade-in-up relative z-10">
        <div class="max-w-3xl mx-auto space-y-2">
            <div class="flex justify-between text-slate-600">
                <span id="subtotal-label">Subtotal (0 items)</span>
                <span id="subtotal-val">Rs 0.00</span>
            </div>
            <div class="flex justify-between text-slate-600">
                <span>GST (18%)</span>
                <span id="tax-val">Rs 0.00</span>
            </div>
            <div class="h-px bg-slate-200"></div>
            <div class="flex justify-between text-lg font-bold text-slate-900">
                <span>Total</span>
                <span id="total-val">Rs 0.00</span>
            </div>
            <a href="{% url 'payment' %}" class="block pt-2">
                <button
                    class="w-full h-14 rounded-2xl bg-emerald-500 hover:bg-emerald-600 text-white text-lg font-semibold shadow-lg shadow-emerald-200 transition-all active:scale-[0.99] flex items-center justify-center">
                    Proceed to Pay
                </button>
            </a>
        </div>
    </div>

    <script>
        let cart = [];

        const formatAmount = (value) => `Rs ${Number(value).toFixed(2)}`;

        const storeCode = "{{ store_code }}";

        window.addEventListener('load', () => {
            const savedCart = localStorage.getItem('mart_genie_cart');
            if (savedCart) {
                let loadedCart = JSON.parse(savedCart);
                cart = loadedCart.filter(item => item.storeCode === storeCode);
                
                // Keep local storage perfectly synced with the purged cart
                if (cart.length !== loadedCart.length) {
                    localStorage.setItem('mart_genie_cart', JSON.stringify(cart));
                }
            }
            renderCart();
        });

        function renderCart() {
            const container = document.getElementById('cart-container');
            const clearBtn = document.getElementById('clear-btn');
            const scanMoreBtn = document.getElementById('scan-more-btn');
            const checkoutSection = document.getElementById('checkout-section');
            const spacer = document.getElementById('spacer');

            if (cart.length === 0) {
                clearBtn.classList.add('hidden');
                spacer.classList.remove('hidden');
                scanMoreBtn.classList.add('hidden');
                checkoutSection.classList.add('hidden', 'fade-in-up');

                container.innerHTML = `
                    <div class="max-w-3xl mx-auto flex flex-col items-center justify-center min-h-full px-6 py-14 fade-in">
                        <div class="w-24 h-24 rounded-full bg-white/80 border border-slate-200 flex items-center justify-center mb-6">
                            <i data-lucide="shopping-bag" class="w-10 h-10 text-slate-400"></i>
                        </div>
                        <h2 class="text-2xl font-semibold text-slate-900 mb-2">Your cart is empty</h2>
                        <p class="text-slate-600 text-center mb-7">Start scanning products to add them here.</p>
                        <a href="{% url 'scanner' %}">
                            <button class="bg-emerald-500 hover:bg-emerald-600 text-white rounded-xl px-6 py-3 flex items-center font-semibold shadow-md shadow-emerald-200 transition-colors">
                                <i data-lucide="scan-line" class="mr-2 h-4 w-4"></i>
                                Scan Products
                            </button>
                        </a>
                    </div>
                `;
            } else {
                clearBtn.classList.remove('hidden');
                spacer.classList.add('hidden');
                scanMoreBtn.classList.remove('hidden');
                checkoutSection.classList.remove('hidden');

                let subtotal = 0;
                let itemCount = 0;

                let html = '<div class="max-w-3xl mx-auto p-4 space-y-3">';
                cart.forEach(item => {
                    subtotal += item.price * item.quantity;
                    itemCount += item.quantity;
                    html += `
                        <div class="glass-card p-4 rounded-2xl flex gap-4 items-center fade-in">
                            <div class="flex-1 min-w-0">
                                <h3 class="font-semibold text-slate-900 truncate">${item.name}</h3>
                                <p class="text-slate-600 text-sm">${formatAmount(item.price)}</p>
                            </div>

                            <div class="flex items-center gap-2 bg-slate-100/80 rounded-xl p-1">
                                <button onclick="updateQuantity('${item.id}', ${item.quantity - 1})" class="w-8 h-8 flex items-center justify-center rounded-lg bg-white shadow-sm text-slate-600 hover:text-emerald-600" aria-label="Decrease quantity">
                                    <i data-lucide="minus" class="w-4 h-4"></i>
                                </button>
                                <span class="font-semibold w-6 text-center text-sm">${item.quantity}</span>
                                <button onclick="updateQuantity('${item.id}', ${item.quantity + 1})" class="w-8 h-8 flex items-center justify-center rounded-lg bg-white shadow-sm text-slate-600 hover:text-emerald-600" aria-label="Increase quantity">
                                    <i data-lucide="plus" class="w-4 h-4"></i>
                                </button>
                            </div>

                            <button onclick="removeItem('${item.id}')" class="p-2 text-slate-400 hover:text-red-500 transition-colors" aria-label="Remove item">
                                <i data-lucide="x" class="w-4 h-4"></i>
                            </button>
                        </div>
                    `;
                });
                html += '</div>';
                container.innerHTML = html;

                const tax = subtotal * 0.18;
                const total = subtotal + tax;

                document.getElementById('subtotal-label').textContent = `Subtotal (${itemCount} items)`;
                document.getElementById('subtotal-val').textContent = formatAmount(subtotal);
                document.getElementById('tax-val').textContent = formatAmount(tax);
                document.getElementById('total-val').textContent = formatAmount(total);
            }

            lucide.createIcons();
            localStorage.setItem('mart_genie_cart', JSON.stringify(cart));
        }

        window.updateQuantity = (id, newQty) => {
            if (newQty <= 0) {
                removeItem(id);
                return;
            }
            cart = cart.map(item => item.id === id ? { ...item, quantity: newQty } : item);
            renderCart();
        };

        window.removeItem = (id) => {
            cart = cart.filter(item => item.id !== id);
            renderCart();
        };

        window.clearCart = () => {
            if (confirm('Are you sure you want to clear your cart?')) {
                cart = [];
                renderCart();
            }
        };
    </script>
</body>

</html>
