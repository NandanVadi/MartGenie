{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - MartGenie</title>
    <!-- Inter font for Ethereal Concierge -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            base: '#f7f9fb', text: '#191c1e', muted: '#3c4a42',
                            primary: '#006c49', accent: '#10b981', 
                            surface: '#ffffff', highlight: '#f2f4f6'
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="min-h-screen flex flex-col text-brand-text bg-brand-base relative overflow-hidden font-sans">
    <!-- Ethereal Background Gradients -->
    <div class="fixed top-[-10%] left-[-5%] w-[50rem] h-[50rem] rounded-full bg-[#10b981]/10 blur-[120px] pointer-events-none -z-10 animate-pulse"></div>
    <div class="fixed top-[40%] right-[-10%] w-[40rem] h-[40rem] rounded-full bg-[#0D9488]/10 blur-[120px] pointer-events-none -z-10 animate-pulse"></div>

    <!-- Sticky Glass Header -->
    <div class="bg-white/60 backdrop-blur-2xl sticky top-0 z-20 border-b border-white">
        <div class="max-w-3xl mx-auto flex items-center justify-between p-4 px-6">
            <a href="{% url 'scanner' %}" class="text-brand-muted p-2 hover:bg-brand-highlight rounded-full transition-colors"
                aria-label="Back to scanner">
                <i data-lucide="arrow-left" class="h-6 w-6"></i>
            </a>
            <h1 class="font-bold text-xl text-brand-text">Your Cart</h1>
            <button onclick="clearCart()" id="clear-btn"
                class="text-red-500 hover:text-red-600 hover:bg-red-50 p-2 rounded-full transition-colors hidden"
                aria-label="Clear cart">
                <i data-lucide="trash-2" class="h-6 w-6"></i>
            </button>
            <div id="spacer" class="w-10 h-10 hidden"></div>
        </div>
    </div>

    <!-- Dynamic Cart Container -->
    <div class="flex-1 overflow-auto relative z-10 px-4 pt-6 pb-2" id="cart-container"></div>

    <div class="max-w-3xl w-full mx-auto px-4 py-4 hidden relative z-10" id="scan-more-btn">
        <a href="{% url 'scanner' %}" class="block">
            <button
                class="w-full rounded-[2rem] border-dashed border-2 border-brand-accent/50 text-brand-primary hover:bg-white bg-white/50 h-16 flex items-center justify-center font-bold text-lg transition-colors backdrop-blur-sm">
                <i data-lucide="scan-line" class="mr-3 h-6 w-6"></i>
                Scan More Items
            </button>
        </a>
    </div>

    <!-- Fixed Bottom Summary -->
    <div id="checkout-section"
        class="bg-white/80 backdrop-blur-2xl border-t border-white p-6 md:p-8 space-y-6 hidden relative z-10 pb-8 rounded-t-[3rem] shadow-[0_-10px_40px_rgba(0,108,73,0.05)] mt-auto">
        <div class="max-w-3xl mx-auto space-y-3">
            <div class="flex justify-between text-brand-muted font-medium">
                <span id="subtotal-label">Subtotal (0 items)</span>
                <span id="subtotal-val">Rs 0.00</span>
            </div>
            <div class="flex justify-between text-brand-muted font-medium">
                <span>GST (18%)</span>
                <span id="tax-val">Rs 0.00</span>
            </div>
            <div class="h-[1px] w-full bg-brand-highlight my-2"></div>
            <div class="flex justify-between text-2xl font-extrabold text-brand-text">
                <span>Total</span>
                <span id="total-val">Rs 0.00</span>
            </div>
            <a href="{% url 'payment' %}" class="block pt-4 text-center">
                <button
                    class="w-full h-16 rounded-full bg-gradient-to-br from-brand-primary to-brand-accent hover:opacity-90 text-white text-xl font-bold shadow-xl shadow-brand-accent/30 transition-all active:scale-[0.98] flex items-center justify-center">
                    Proceed to Pay
                </button>
            </a>
        </div>
    </div>

    <script>
        let cart = [];
        const formatAmount = (value) => `Rs ${Number(value).toFixed(2)}`;
        const storeCode = "{{ store_code }}";

        window.addEventListener('load', () => {
            const savedCart = localStorage.getItem('mart_genie_cart');
            if (savedCart) {
                let loadedCart = JSON.parse(savedCart);
                cart = loadedCart.filter(item => item.storeCode === storeCode);
                if (cart.length !== loadedCart.length) {
                    localStorage.setItem('mart_genie_cart', JSON.stringify(cart));
                }
            }
            renderCart();
        });

        function renderCart() {
            const container = document.getElementById('cart-container');
            const clearBtn = document.getElementById('clear-btn');
            const scanMoreBtn = document.getElementById('scan-more-btn');
            const checkoutSection = document.getElementById('checkout-section');
            const spacer = document.getElementById('spacer');

            if (cart.length === 0) {
                clearBtn.classList.add('hidden');
                spacer.classList.remove('hidden');
                scanMoreBtn.classList.add('hidden');
                checkoutSection.classList.add('hidden');

                container.innerHTML = `
                    <div class="max-w-3xl mx-auto flex flex-col items-center justify-center min-h-full px-6 py-20 text-center transition-all">
                        <div class="w-32 h-32 rounded-full bg-white/70 border border-white shadow-xl shadow-slate-200/50 flex items-center justify-center mb-8">
                            <i data-lucide="shopping-bag" class="w-14 h-14 text-brand-muted opacity-50"></i>
                        </div>
                        <h2 class="text-3xl font-bold text-brand-text mb-3">Your cart is empty</h2>
                        <p class="text-brand-muted text-lg mb-10 max-w-sm">Start scanning products around the store to add them here.</p>
                        <a href="{% url 'scanner' %}" class="w-full max-w-sm">
                            <button class="w-full h-16 rounded-full bg-gradient-to-br from-brand-primary to-brand-accent hover:opacity-90 text-white text-lg font-bold shadow-lg shadow-brand-accent/30 transition-all flex items-center justify-center gap-2">
                                <i data-lucide="scan-line" class="mr-2 w-6 h-6"></i>
                                Start Scanning
                            </button>
                        </a>
                    </div>
                `;
            } else {
                clearBtn.classList.remove('hidden');
                spacer.classList.add('hidden');
                scanMoreBtn.classList.remove('hidden');
                checkoutSection.classList.remove('hidden');

                let subtotal = 0;
                let itemCount = 0;

                let html = '<div class="max-w-3xl mx-auto space-y-4">';
                cart.forEach(item => {
                    subtotal += item.price * item.quantity;
                    itemCount += item.quantity;
                    html += `
                        <div class="rounded-[2rem] bg-white/50 backdrop-blur-xl border border-white p-5 flex gap-4 items-center shadow-[0_10px_20px_rgba(0,0,0,0.02)] transition-all">
                            <div class="flex-1 min-w-0 pr-4">
                                <h3 class="font-bold text-lg text-brand-text truncate leading-tight">${item.name}</h3>
                                <p class="text-brand-primary font-bold mt-1">${formatAmount(item.price)}</p>
                            </div>

                            <div class="flex items-center gap-1 bg-brand-highlight rounded-full p-1 border border-white/50">
                                <button onclick="updateQuantity('${item.id}', ${item.quantity - 1})" class="w-10 h-10 flex items-center justify-center rounded-full bg-white shadow-sm text-brand-text hover:text-brand-primary hover:bg-brand-highlight transition-colors" aria-label="Decrease quantity">
                                    <i data-lucide="minus" class="w-5 h-5"></i>
                                </button>
                                <span class="font-bold w-8 text-center text-base">${item.quantity}</span>
                                <button onclick="updateQuantity('${item.id}', ${item.quantity + 1})" class="w-10 h-10 flex items-center justify-center rounded-full bg-white shadow-sm text-brand-text hover:text-brand-primary hover:bg-brand-highlight transition-colors" aria-label="Increase quantity">
                                    <i data-lucide="plus" class="w-5 h-5"></i>
                                </button>
                            </div>

                            <button onclick="removeItem('${item.id}')" class="p-3 bg-red-50 text-red-400 hover:text-red-600 hover:bg-red-100 rounded-full transition-colors ml-2" aria-label="Remove item">
                                <i data-lucide="x" class="w-5 h-5"></i>
                            </button>
                        </div>
                    `;
                });
                html += '</div>';
                container.innerHTML = html;

                const tax = subtotal * 0.18;
                const total = subtotal + tax;

                document.getElementById('subtotal-label').textContent = `Subtotal (${itemCount} items)`;
                document.getElementById('subtotal-val').textContent = formatAmount(subtotal);
                document.getElementById('tax-val').textContent = formatAmount(tax);
                document.getElementById('total-val').textContent = formatAmount(total);
            }

            lucide.createIcons();
            localStorage.setItem('mart_genie_cart', JSON.stringify(cart));
        }

        window.updateQuantity = (id, newQty) => {
            if (newQty <= 0) {
                removeItem(id);
                return;
            }
            cart = cart.map(item => item.id === id ? { ...item, quantity: newQty } : item);
            renderCart();
        };

        window.removeItem = (id) => {
            cart = cart.filter(item => item.id !== id);
            renderCart();
        };

        window.clearCart = () => {
            if (confirm('Are you sure you want to clear your cart?')) {
                cart = [];
                renderCart();
            }
        };
    </script>
    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 w-full bg-white border-t border-slate-200 backdrop-blur-md z-40 pb-safe shadow-[0_-4px_20px_rgba(0,0,0,0.03)]">
        <div class="flex items-center justify-between px-6 py-2 max-w-xl mx-auto h-16">
            <a href="{% url 'customer_home' %}" class="flex flex-col items-center gap-1 min-w-[60px] text-brand-muted hover:text-brand-primary transition-colors">
                <i data-lucide="home" class="w-5 h-5"></i>
                <span class="text-[9px] font-bold tracking-wide">HOME</span>
            </a>
            <a href="{% url 'customer_orders' %}" class="flex flex-col items-center gap-1 min-w-[60px] text-brand-muted hover:text-brand-primary transition-colors">
                <i data-lucide="receipt" class="w-5 h-5"></i>
                <span class="text-[9px] font-bold tracking-wide">ORDERS</span>
            </a>
            <a href="{% url 'scanner' %}" class="flex flex-col items-center gap-1 min-w-[60px] text-brand-muted hover:text-brand-primary transition-colors">
                <i data-lucide="store" class="w-5 h-5"></i>
                <span class="text-[9px] font-bold tracking-wide">STORE</span>
            </a>
            <a href="{% url 'customer_profile' %}" class="flex flex-col items-center gap-1 min-w-[60px] text-brand-muted hover:text-brand-primary transition-colors">
                <i data-lucide="user" class="w-5 h-5"></i>
                <span class="text-[9px] font-bold tracking-wide">PROFILE</span>
            </a>
        </div>
    </nav>
</body>

</html>
