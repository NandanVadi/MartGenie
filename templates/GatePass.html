{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gate Pass - MartGenie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>

<body class="min-h-screen flex flex-col text-slate-800 relative overflow-y-auto bg-slate-50">
    <div id="main-container" class="flex-1 flex flex-col relative z-10"></div>

    <script>
        let order = null;

        window.addEventListener('load', () => {
            const lastOrder = localStorage.getItem('mart_genie_last_order');
            if (lastOrder) {
                order = JSON.parse(lastOrder);
            }
            render();
        });

        function render() {
            const container = document.getElementById('main-container');

            if (!order) {
                container.innerHTML = `
                    <div class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
                        <p class="text-slate-600">No recent order found.</p>
                        <a href="{% url 'scanner' %}" class="mt-4">
                            <button class="bg-emerald-500 hover:bg-emerald-600 text-white rounded-xl px-6 py-3 font-semibold transition-colors">Start Shopping</button>
                        </a>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            const date = new Date(order.timestamp);
            const formattedDate = date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
            const formattedTime = date.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });

            // Generate items HTML
            const itemsHtml = order.items.map(item => `
                <div class="flex justify-between text-sm py-1">
                    <span class="text-slate-700">${item.name} <span class="text-slate-400 text-xs">x${item.quantity}</span></span>
                    <span class="font-medium text-slate-900">Rs ${(item.price * item.quantity).toFixed(2)}</span>
                </div>
            `).join('');

            container.innerHTML = `
                <div class="max-w-md w-full mx-auto px-4 py-8">
                    <!-- Success Header -->
                    <div class="text-center mb-6 fade-in-up">
                        <div class="w-16 h-16 rounded-full bg-emerald-100 flex items-center justify-center mx-auto mb-3 shadow-sm">
                             <i data-lucide="check" class="w-8 h-8 text-emerald-600"></i>
                        </div>
                        <h1 class="text-2xl font-bold text-slate-800">Payment Successful</h1>
                        <p class="text-emerald-600 font-medium">Order Confirmed</p>
                    </div>

                    <!-- Receipt Card -->
                    <div id="receipt-card" class="bg-white rounded-3xl shadow-xl shadow-slate-200/50 overflow-hidden fade-in-up delay-100 border border-slate-100">
                        <!-- Receipt Top -->
                        <div class="bg-slate-50 p-6 border-b border-dashed border-slate-200 text-center relative">
                            <div class="w-3 h-3 bg-slate-50 rounded-full absolute -bottom-1.5 -left-1.5 border border-slate-200"></div>
                            <div class="w-3 h-3 bg-slate-50 rounded-full absolute -bottom-1.5 -right-1.5 border border-slate-200"></div>
                            
                            <h2 class="text-xl font-bold text-slate-800 tracking-tight">MartGenie</h2>
                            <p class="text-xs text-slate-500 uppercase tracking-widest font-semibold mt-1">Digital Receipt</p>
                        </div>

                        <!-- Info -->
                        <div class="px-6 py-4 bg-white border-b border-dashed border-slate-100 flex justify-between text-xs text-slate-500">
                             <span>${formattedDate}, ${formattedTime}</span>
                             <span class="font-mono">#${order.orderId}</span>
                        </div>

                        <!-- Items -->
                        <div class="p-6 space-y-1 bg-white min-h-[100px]">
                            ${itemsHtml}
                        </div>

                        <!-- Total -->
                        <div class="px-6 pb-6 bg-white">
                            <div class="border-t border-dashed border-slate-200 pt-4">
                                <div class="flex justify-between items-end">
                                    <span class="text-slate-500 font-medium">Total Amount</span>
                                    <span class="text-2xl font-bold text-emerald-600">Rs ${order.total.toFixed(2)}</span>
                                </div>
                            </div>
                        </div>

                        <!-- QR Area -->
                        <div class="p-6 bg-slate-900 flex flex-col items-center justify-center text-center">
                             <div class="bg-white p-2 rounded-xl mb-3 shadow-lg">
                                <div id="qrcode"></div>
                             </div>
                             <p class="text-white/50 text-[10px] uppercase tracking-widest font-bold">Scan at Exit Gate</p>
                        </div>
                    </div>

                    <!-- Actions -->
                    <div class="mt-8 flex flex-col gap-3 fade-in-up delay-200">
                        <button onclick="saveGatePass()" class="w-full h-12 rounded-xl bg-slate-900 text-white font-semibold shadow-xl shadow-slate-300 flex items-center justify-center gap-2 hover:bg-slate-800 transition-all active:scale-95">
                            <i data-lucide="download" class="w-4 h-4"></i>
                            Save Bill
                        </button>
                        <a href="{% url 'customer_profile' %}" class="block">
                            <button class="w-full h-12 rounded-xl bg-white border-2 border-slate-200 text-slate-700 font-semibold hover:bg-slate-50 transition-all active:scale-95">Go to Profile</button>
                        </a>
                    </div>
                    
                    <div class="h-10"></div>
                </div>
            `;

            lucide.createIcons();

            setTimeout(() => {
                const qrContainer = document.getElementById('qrcode');
                if (qrContainer && order.qrData) {
                    qrContainer.innerHTML = '';
                    new QRCode(qrContainer, {
                        text: order.qrData,
                        width: 140,
                        height: 140,
                        colorDark: '#000000',
                        colorLight: '#ffffff',
                        correctLevel: QRCode.CorrectLevel.M
                    });
                }
            }, 100);
        }

        function saveGatePass() {
            if (!order) return;

            const { jsPDF } = window.jspdf;
            const pageW = 300;
            let y = 0;

            const itemCount = order.items.length;
            const estimatedH = 320 + (itemCount * 22) + 160;

            const pdf = new jsPDF({ orientation: 'portrait', unit: 'pt', format: [pageW, estimatedH] });

            // -- Header --
            pdf.setFillColor(16, 185, 129);
            pdf.roundedRect(pageW / 2 - 20, 20, 40, 40, 8, 8, 'F');
            pdf.setTextColor(255, 255, 255);
            pdf.setFontSize(18);
            pdf.setFont('helvetica', 'bold');
            pdf.text('M', pageW / 2, 47, { align: 'center' });

            y = 80;
            pdf.setTextColor(15, 23, 42);
            pdf.setFontSize(16);
            pdf.setFont('helvetica', 'bold');
            pdf.text('MartGenie', pageW / 2, y, { align: 'center' });

            y += 14;
            pdf.setFontSize(8);
            pdf.setFont('helvetica', 'normal');
            pdf.setTextColor(100, 116, 139);
            pdf.text('Digital Receipt', pageW / 2, y, { align: 'center' });

            // Date and Order ID
            y += 18;
            const date = new Date(order.timestamp);
            const fDate = date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
            const fTime = date.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
            pdf.setFontSize(8);
            pdf.setTextColor(148, 163, 184);
            pdf.text(`${fDate}, ${fTime}`, 24, y);
            pdf.setFont('courier', 'normal');
            pdf.text(`#${order.orderId}`, pageW - 24, y, { align: 'right' });

            // Dashed line
            y += 12;
            pdf.setDrawColor(226, 232, 240);
            pdf.setLineDashPattern([3, 3], 0);
            pdf.line(20, y, pageW - 20, y);
            pdf.setLineDashPattern([], 0);

            // -- Items --
            y += 18;
            order.items.forEach(item => {
                pdf.setFont('helvetica', 'normal');
                pdf.setFontSize(10);
                pdf.setTextColor(51, 65, 85);
                pdf.text(`${item.name} x${item.quantity}`, 24, y);
                pdf.setFont('helvetica', 'bold');
                pdf.setTextColor(15, 23, 42);
                const itemTotal = (item.price * item.quantity).toFixed(2);
                pdf.text(`Rs ${itemTotal}`, pageW - 24, y, { align: 'right' });
                y += 20;
            });

            // Dashed line
            y += 4;
            pdf.setDrawColor(226, 232, 240);
            pdf.setLineDashPattern([3, 3], 0);
            pdf.line(20, y, pageW - 20, y);
            pdf.setLineDashPattern([], 0);

            // -- Total --
            y += 18;
            pdf.setFont('helvetica', 'normal');
            pdf.setFontSize(11);
            pdf.setTextColor(100, 116, 139);
            pdf.text('Total Amount', 24, y);
            pdf.setFont('helvetica', 'bold');
            pdf.setFontSize(16);
            pdf.setTextColor(5, 150, 105);
            pdf.text(`Rs ${order.total.toFixed(2)}`, pageW - 24, y, { align: 'right' });

            y += 30;

            // -- QR Code --
            if (order.qrData) {
                const tempDiv = document.createElement('div');
                tempDiv.style.cssText = 'position:absolute;left:-9999px;top:-9999px;';
                document.body.appendChild(tempDiv);

                new QRCode(tempDiv, {
                    text: order.qrData,
                    width: 240,
                    height: 240,
                    colorDark: '#000000',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.M
                });

                setTimeout(() => {
                    const qrCanvas = tempDiv.querySelector('canvas');
                    if (qrCanvas) {
                        const qrImg = qrCanvas.toDataURL('image/png');
                        const qrSize = 100;
                        const qrX = (pageW - qrSize) / 2;

                        pdf.setDrawColor(226, 232, 240);
                        pdf.setLineDashPattern([], 0);
                        pdf.roundedRect(qrX - 6, y - 6, qrSize + 12, qrSize + 12, 4, 4, 'S');
                        pdf.addImage(qrImg, 'PNG', qrX, y, qrSize, qrSize);

                        y += qrSize + 14;
                        pdf.setFont('helvetica', 'normal');
                        pdf.setFontSize(7);
                        pdf.setTextColor(148, 163, 184);
                        pdf.text('SCAN AT EXIT GATE', pageW / 2, y, { align: 'center' });
                    }

                    document.body.removeChild(tempDiv);
                    pdf.save(`MartGenie-Bill-${order.orderId}.pdf`);
                }, 200);
            } else {
                pdf.save(`MartGenie-Bill-${order.orderId}.pdf`);
            }
        }
    </script>
</body>

</html>
