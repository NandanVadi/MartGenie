{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exit Pass - MartGenie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            base: '#f7f9fb', text: '#191c1e', muted: '#64748b',
                            primary: '#006c49', accent: '#10b981', highlight: '#f1f5f9'
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="min-h-screen flex flex-col text-brand-text bg-brand-base relative overflow-y-auto font-sans">
    
    <!-- Soft background -->
    <div class="fixed top-[-10%] left-[-5%] w-[40rem] h-[40rem] rounded-full bg-brand-accent/10 blur-[100px] pointer-events-none -z-10"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[30rem] h-[30rem] rounded-full bg-teal-400/8 blur-[100px] pointer-events-none -z-10"></div>

    <div id="main-container" class="flex-1 flex flex-col relative z-10 w-full h-full"></div>

    <script>
        let order = null;

        window.addEventListener('load', () => {
            const lastOrder = localStorage.getItem('mart_genie_last_order');
            if (lastOrder) order = JSON.parse(lastOrder);
            render();
        });

        function render() {
            const container = document.getElementById('main-container');

            if (!order) {
                container.innerHTML = `
                    <div class="flex-1 flex flex-col items-center justify-center p-8 text-center">
                        <div class="w-20 h-20 bg-slate-50 rounded-2xl flex items-center justify-center mb-6">
                            <i data-lucide="receipt" class="w-10 h-10 text-brand-muted/40"></i>
                        </div>
                        <h2 class="text-2xl font-bold text-brand-text mb-2">No Exit Pass</h2>
                        <p class="text-brand-muted text-sm mb-6 max-w-xs">You need to place an order first to get an exit pass.</p>
                        <a href="{% url 'scanner' %}" class="bg-gradient-to-r from-brand-primary to-brand-accent text-white font-semibold px-6 py-3 rounded-xl flex items-center gap-2 shadow-md hover:opacity-90 transition-all">
                            <i data-lucide="shopping-bag" class="w-5 h-5"></i> Enter Store
                        </a>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            const date = new Date(order.timestamp);
            const formattedDate = date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
            const formattedTime = date.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });

            const itemsHtml = order.items.map(item => `
                <div class="flex justify-between items-center py-2.5 border-b border-dashed border-slate-100 last:border-0">
                    <span class="text-sm text-brand-text">${item.name} <span class="text-xs text-brand-muted ml-1">x${item.quantity}</span></span>
                    <span class="text-sm font-semibold text-brand-text">Rs ${(item.price * item.quantity).toFixed(2)}</span>
                </div>
            `).join('');

            container.innerHTML = `
                <div class="max-w-md w-full mx-auto px-4 py-8 pb-20">
                    
                    <!-- Receipt Card -->
                    <div id="receipt-card" class="bg-white rounded-2xl shadow-lg overflow-hidden fade-in-up">
                        
                        <!-- Header -->
                        <div class="bg-gradient-to-br from-brand-primary to-brand-accent p-6 text-center">
                            <h2 class="text-2xl font-bold text-white">MartGenie</h2>
                            <p class="text-xs text-emerald-100 mt-1 font-medium">Exit Pass</p>
                        </div>

                        <!-- Order Info -->
                        <div class="px-5 py-3 bg-slate-50 flex justify-between text-xs text-brand-muted font-medium">
                             <span>${formattedDate}, ${formattedTime}</span>
                             <span class="font-mono text-brand-primary font-semibold">Order #${order.orderId}</span>
                        </div>

                        <!-- Items -->
                        <div class="px-5 py-3">
                            ${itemsHtml}
                        </div>

                        <!-- Total -->
                        <div class="px-5 py-4 border-t border-slate-100">
                            <div class="flex justify-between items-center">
                                <span class="text-sm text-brand-muted font-medium">Total Paid</span>
                                <span class="text-2xl font-bold text-brand-primary">Rs ${order.total.toFixed(2)}</span>
                            </div>
                        </div>

                        <!-- QR Code -->
                        <div class="bg-slate-900 p-8 flex flex-col items-center justify-center text-center rounded-b-2xl">
                             <div class="bg-white p-2.5 rounded-xl shadow-lg mb-4">
                                <div id="qrcode"></div>
                             </div>
                             <div class="flex items-center gap-2 text-emerald-400 text-xs font-semibold">
                                 <i data-lucide="shield-check" class="w-4 h-4"></i>
                                 Show at Exit Gate
                             </div>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="mt-6 flex flex-col gap-3 fade-in-up w-full">
                        <button onclick="saveGatePass()" class="w-full h-12 rounded-xl bg-white border border-slate-200 text-brand-text font-semibold flex items-center justify-center gap-2 hover:bg-slate-50 transition-all active:scale-[0.98] shadow-sm text-sm">
                            <i data-lucide="download" class="w-4 h-4"></i> Download PDF
                        </button>
                        <a href="{% url 'customer_profile' %}" class="block w-full">
                            <button class="w-full h-12 rounded-xl bg-slate-50 text-brand-muted font-medium flex items-center justify-center gap-2 hover:bg-slate-100 transition-all text-sm">
                                <i data-lucide="user" class="w-4 h-4"></i> Go to Profile
                            </button>
                        </a>
                    </div>
                </div>
            `;

            lucide.createIcons();

            setTimeout(() => {
                const qrContainer = document.getElementById('qrcode');
                if (qrContainer && order.qrData) {
                    qrContainer.innerHTML = '';
                    new QRCode(qrContainer, {
                        text: order.qrData,
                        width: 160,
                        height: 160,
                        colorDark: '#0f172a',
                        colorLight: '#ffffff',
                        correctLevel: QRCode.CorrectLevel.M
                    });
                }
            }, 100);
        }

        function saveGatePass() {
            if (!order) return;
            const { jsPDF } = window.jspdf;
            const pageW = 300;
            let y = 0;
            const itemCount = order.items.length;
            const estimatedH = 320 + (itemCount * 22) + 160;
            const pdf = new jsPDF({ orientation: 'portrait', unit: 'pt', format: [pageW, estimatedH] });

            pdf.setFillColor(0, 108, 73);
            pdf.roundedRect(pageW / 2 - 20, 20, 40, 40, 8, 8, 'F');
            pdf.setTextColor(255, 255, 255);
            pdf.setFontSize(18);
            pdf.setFont('helvetica', 'bold');
            pdf.text('M', pageW / 2, 47, { align: 'center' });

            y = 80;
            pdf.setTextColor(15, 23, 42);
            pdf.setFontSize(16);
            pdf.setFont('helvetica', 'bold');
            pdf.text('MartGenie', pageW / 2, y, { align: 'center' });

            y += 14;
            pdf.setFontSize(8);
            pdf.setFont('helvetica', 'normal');
            pdf.setTextColor(100, 116, 139);
            pdf.text('Exit Pass & Receipt', pageW / 2, y, { align: 'center' });

            y += 18;
            const date = new Date(order.timestamp);
            const fDate = date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
            const fTime = date.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
            pdf.setFontSize(8);
            pdf.setTextColor(148, 163, 184);
            pdf.text(`${fDate}, ${fTime}`, 24, y);
            pdf.setFont('courier', 'normal');
            pdf.text(`#${order.orderId}`, pageW - 24, y, { align: 'right' });

            y += 12;
            pdf.setDrawColor(226, 232, 240);
            pdf.setLineDashPattern([3, 3], 0);
            pdf.line(20, y, pageW - 20, y);
            pdf.setLineDashPattern([], 0);

            y += 18;
            order.items.forEach(item => {
                pdf.setFont('helvetica', 'normal');
                pdf.setFontSize(10);
                pdf.setTextColor(51, 65, 85);
                pdf.text(`${item.name} x${item.quantity}`, 24, y);
                pdf.setFont('helvetica', 'bold');
                pdf.setTextColor(15, 23, 42);
                const itemTotal = (item.price * item.quantity).toFixed(2);
                pdf.text(`Rs ${itemTotal}`, pageW - 24, y, { align: 'right' });
                y += 20;
            });

            y += 4;
            pdf.setDrawColor(226, 232, 240);
            pdf.setLineDashPattern([3, 3], 0);
            pdf.line(20, y, pageW - 20, y);
            pdf.setLineDashPattern([], 0);

            y += 18;
            pdf.setFont('helvetica', 'normal');
            pdf.setFontSize(11);
            pdf.setTextColor(100, 116, 139);
            pdf.text('Total Paid', 24, y);
            pdf.setFont('helvetica', 'bold');
            pdf.setFontSize(16);
            pdf.setTextColor(0, 108, 73);
            pdf.text(`Rs ${order.total.toFixed(2)}`, pageW - 24, y, { align: 'right' });

            y += 30;

            if (order.qrData) {
                const tempDiv = document.createElement('div');
                tempDiv.style.cssText = 'position:absolute;left:-9999px;top:-9999px;';
                document.body.appendChild(tempDiv);
                new QRCode(tempDiv, { text: order.qrData, width: 240, height: 240, colorDark: '#000000', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.M });

                setTimeout(() => {
                    const qrCanvas = tempDiv.querySelector('canvas');
                    if (qrCanvas) {
                        const qrImg = qrCanvas.toDataURL('image/png');
                        const qrSize = 100;
                        const qrX = (pageW - qrSize) / 2;
                        pdf.setDrawColor(226, 232, 240);
                        pdf.setLineDashPattern([], 0);
                        pdf.roundedRect(qrX - 6, y - 6, qrSize + 12, qrSize + 12, 4, 4, 'S');
                        pdf.addImage(qrImg, 'PNG', qrX, y, qrSize, qrSize);

                        y += qrSize + 14;
                        pdf.setFont('helvetica', 'bold');
                        pdf.setFontSize(8);
                        pdf.setTextColor(100, 116, 139);
                        pdf.text('SHOW AT EXIT GATE', pageW / 2, y, { align: 'center' });
                    }
                    document.body.removeChild(tempDiv);
                    pdf.save(`MartGenie-Receipt-${order.orderId}.pdf`);
                }, 200);
            } else {
                pdf.save(`MartGenie-Receipt-${order.orderId}.pdf`);
            }
        }
    </script>
</body>
</html>
